<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prontuário Ambulatorial — Dr. Brendow Mártin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="cid10.js"></script>
<script src="medicamentos.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0d1b2a; --navy-mid: #1a2e45; --steel: #2e4a6b;
    --ice: #c8d8e8; --gold: #b89a5e; --gold-light: #d4b97a;
    --white: #f5f2ee; --gray: #8a9bb0; --light-bg: #eef2f7;
    --danger: #c44; --success: #2d6a4f;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'DM Sans', sans-serif;
  }
  body {
    background: var(--white); color: var(--navy);
    font-family: var(--font-sans); font-size: 16px; line-height: 1.6;
    min-height: 100vh; overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  a { color: var(--steel); }

  .topbar {
    background: var(--navy); color: var(--white);
    padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(184,154,94,0.2);
  }
  .topbar-logo { display: flex; align-items: center; gap: 14px; }
  .topbar-logo a { color: var(--white); text-decoration: none; display: block; }
  .topbar-logo img { height: 44px; filter: brightness(0) invert(1); }
  .topbar-tag {
    display: inline-block;
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--gold-light); padding: 4px 10px;
    border: 1px solid rgba(184,154,94,0.4);
  }
  .topbar-actions { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .topbar-user { font-size: 0.82rem; color: rgba(200,216,232,0.85); }
  .btn-link {
    background: none; border: none; color: var(--gold-light); font-size: 0.78rem;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 0;
    text-decoration: none; display: inline-block;
  }
  .btn-link:hover { color: var(--white); }

  .wrap { max-width: 1240px; margin: 0 auto; padding: 32px 28px 80px; }

  .card {
    background: var(--white); border: 1px solid #d8e4f0;
    border-top: 3px solid var(--gold); padding: 28px 28px;
    box-shadow: 0 12px 36px rgba(13,27,42,0.08); margin-bottom: 22px;
  }
  .card h2 {
    font-family: var(--font-serif); font-size: 1.7rem; font-weight: 300;
    margin-bottom: 4px;
  }
  .card h2 em { font-style: italic; color: var(--steel); }
  .card .subtitle { font-size: 0.9rem; color: #5a6f85; margin-bottom: 18px; }

  .section-title {
    font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--steel); margin: 22px 0 10px;
    padding-bottom: 6px; border-bottom: 1px solid #d8e4f0;
  }

  /* Forms */
  .form-row { display: grid; gap: 16px; margin-bottom: 12px; }
  .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-row.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  @media (max-width: 720px) {
    .form-row.cols-2, .form-row.cols-3, .form-row.cols-4 { grid-template-columns: 1fr; }
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gray);
  }
  .form-group input, .form-group select, .form-group textarea {
    border: 1px solid #d0dae6; padding: 10px 12px; font-size: 0.95rem;
    color: var(--navy); outline: none; transition: border-color 0.15s;
    font-family: inherit; background: #fff;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--gold);
  }
  .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-hint { font-size: 0.78rem; color: #7a8a9c; margin-top: 2px; }

  /* Buttons */
  .btn-primary, .btn-secondary, .btn-ghost, .btn-danger {
    display: inline-block; border: none; padding: 10px 20px;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; text-decoration: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    font-family: inherit;
  }
  .btn-primary { background: var(--gold); color: var(--navy); }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--navy); border: 1px solid #d0dae6; }
  .btn-secondary:hover { border-color: var(--gold); color: var(--steel); }
  .btn-ghost { background: transparent; color: var(--steel); padding: 6px 10px; font-size: 0.78rem; }
  .btn-ghost:hover { color: var(--gold); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid #f0c0c0; }
  .btn-danger:hover { background: #fdecea; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn-row.right { justify-content: flex-end; }

  .msg { padding: 11px 14px; font-size: 0.88rem; margin-bottom: 14px; }
  .msg.error { background: #fdecea; color: var(--danger); border: 1px solid #f5c6c6; }
  .msg.success { background: #e6f4ea; color: var(--success); border: 1px solid #b7dfca; }
  .msg.info { background: #eaf3fb; color: var(--steel); border: 1px solid #c5d8e8; }

  .filters {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
  }
  .filters input {
    flex: 1; min-width: 220px; padding: 10px 14px;
    border: 1px solid #d0dae6; outline: none; font-size: 0.9rem; background: #fff;
  }
  .filters input:focus { border-color: var(--gold); }

  /* Patient list */
  .patients-table { width: 100%; border-collapse: collapse; }
  .patients-table th {
    text-align: left; padding: 12px 12px;
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gray);
    border-bottom: 1px solid #d8e4f0;
  }
  .patients-table td {
    padding: 14px 12px; border-bottom: 1px solid #eaeff5;
    font-size: 0.92rem; color: var(--navy);
  }
  .patients-table tr { transition: background 0.15s; cursor: pointer; }
  .patients-table tbody tr:hover { background: var(--light-bg); }
  .patients-table .num { font-variant-numeric: tabular-nums; color: var(--steel); }

  /* Patient detail */
  .detail-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 14px; margin-bottom: 16px;
  }
  .detail-header h2 { margin: 0; }
  .patient-meta { font-size: 0.86rem; color: #5a6f85; margin-top: 4px; }

  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid #d8e4f0;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .tab-btn {
    background: transparent; border: none; padding: 12px 20px;
    font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--gray);
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--steel); }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Consultation card */
  .consult-card {
    border: 1px solid #e3eaf2; padding: 16px 18px; margin-bottom: 12px;
    background: var(--white); transition: border-color 0.15s;
  }
  .consult-card:hover { border-color: var(--gold); }
  .consult-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
  }
  .consult-date { font-size: 0.95rem; font-weight: 500; color: var(--navy); }
  .consult-type {
    display: inline-block; padding: 2px 8px; font-size: 0.7rem;
    background: var(--light-bg); color: var(--steel);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .consult-body { font-size: 0.88rem; color: #4a5a70; line-height: 1.55; }
  .consult-body strong { color: var(--navy); font-weight: 500; }
  .consult-actions { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }

  /* Document list */
  .doc-row {
    display: grid; grid-template-columns: 90px 130px 1fr auto; gap: 14px;
    align-items: center; padding: 12px 14px;
    border-bottom: 1px solid #eaeff5; font-size: 0.9rem;
  }
  .doc-row:hover { background: var(--light-bg); }
  .doc-date { font-variant-numeric: tabular-nums; color: var(--steel); font-size: 0.86rem; }
  .doc-type-badge {
    display: inline-block; padding: 3px 10px; font-size: 0.7rem;
    letter-spacing: 0.05em; text-transform: uppercase;
    background: var(--light-bg); color: var(--steel);
  }
  .doc-type-badge.receita_simples { background: #e6f4ea; color: var(--success); }
  .doc-type-badge.receita_especial { background: #fff2e0; color: #8a4f0c; }
  .doc-type-badge.exames { background: #eaf3fb; color: var(--steel); }
  .doc-type-badge.atestado { background: #f0e6f7; color: #6a3aa3; }
  .doc-type-badge.laudo { background: #fdecea; color: #a33; }
  .doc-type-badge.relatorio { background: #f5f2ee; color: var(--navy); }
  .doc-actions { display: flex; gap: 6px; }
  @media (max-width: 720px) {
    .doc-row { grid-template-columns: 1fr; gap: 4px; padding: 12px; }
  }

  /* Doc creator buttons */
  .doc-creator-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 10px; margin-bottom: 18px;
  }
  .doc-creator-btn {
    background: #fff; border: 1px solid #d0dae6; padding: 14px 16px;
    text-align: left; cursor: pointer; transition: all 0.15s;
    font-family: inherit; color: var(--navy);
  }
  .doc-creator-btn:hover { border-color: var(--gold); background: var(--light-bg); }
  .doc-creator-btn .ic { font-size: 1.4rem; margin-bottom: 6px; display: block; }
  .doc-creator-btn .lbl {
    font-size: 0.82rem; font-weight: 500; letter-spacing: 0.04em;
  }
  .doc-creator-btn .desc { font-size: 0.74rem; color: #7a8a9c; margin-top: 3px; }

  /* Modal / drawer */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(13,27,42,0.55);
    display: flex; align-items: flex-start; justify-content: center;
    overflow-y: auto; padding: 40px 16px; z-index: 100;
  }
  .modal {
    background: var(--white); width: 100%; max-width: 760px;
    border-top: 3px solid var(--gold); box-shadow: 0 18px 48px rgba(0,0,0,0.18);
  }
  .modal.lg { max-width: 1000px; }
  .modal-head {
    padding: 18px 24px; border-bottom: 1px solid #d8e4f0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-head h3 {
    font-family: var(--font-serif); font-size: 1.4rem; font-weight: 300;
  }
  .modal-head h3 em { font-style: italic; color: var(--steel); }
  .modal-close {
    background: none; border: none; font-size: 1.5rem; line-height: 1;
    color: var(--gray); cursor: pointer; padding: 4px;
  }
  .modal-close:hover { color: var(--navy); }
  .modal-body { padding: 22px 24px; }
  .modal-foot {
    padding: 14px 24px; border-top: 1px solid #d8e4f0;
    display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap;
  }

  /* Medication list editor */
  .med-editor { border: 1px solid #d8e4f0; padding: 12px; margin-bottom: 8px; }
  .med-editor + .med-editor { margin-top: 8px; }

  /* CID picker */
  .cid-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .cid-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--light-bg); padding: 4px 10px; font-size: 0.82rem;
    color: var(--navy); border: 1px solid #d8e4f0;
  }
  .cid-tag-x {
    background: none; border: none; color: var(--gray); cursor: pointer;
    font-size: 1.05rem; line-height: 1; padding: 0;
  }
  .cid-tag-x:hover { color: var(--danger); }

  /* Calculator results */
  .calc-result {
    background: var(--light-bg); padding: 12px 16px; margin-top: 12px;
    border-left: 3px solid var(--gold);
    font-size: 0.92rem;
  }
  .calc-result strong { color: var(--navy); }

  .empty-state { text-align: center; padding: 48px 20px; color: #7a8a9c; font-size: 0.95rem; }
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 48px 20px; color: var(--gray); font-size: 0.92rem;
  }
  .spinner {
    width: 22px; height: 22px; border: 2px solid #e3eaf2;
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ICP-Brasil — indicador de certificado na topbar */
  .btn-icp {
    background: none; border: 1px solid rgba(184,154,94,0.4);
    color: var(--gold-light); font-size: 0.72rem; font-family: inherit;
    letter-spacing: 0.06em; padding: 5px 10px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-icp:hover { border-color: var(--gold); color: var(--white); }
  .btn-icp.cert-ok  { border-color: #2d9e6b; color: #5dcc9a; }
  .btn-icp.cert-exp { border-color: #c44;    color: #f88; }

  @media (max-width: 720px) {
    .topbar { padding: 12px 16px; }
    .topbar-tag { display: none; }
    .wrap { padding: 22px 14px 60px; }
    .card { padding: 22px 18px; }
    .patients-table thead { display: none; }
    .patients-table, .patients-table tbody, .patients-table tr, .patients-table td {
      display: block; width: 100%;
    }
    .patients-table tr { padding: 14px; border-bottom: 1px solid #d8e4f0; }
    .patients-table td { padding: 4px 0; border: none; font-size: 0.9rem; }
    .modal-body, .modal-head, .modal-foot { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">
    <a href="/" aria-label="Voltar para o site">
      <img src="/images/logo.webp" alt="Dr. Brendow Mártin">
    </a>
    <span class="topbar-tag">Prontuário</span>
  </div>
  <div class="topbar-actions" id="topbar-actions"></div>
</header>

<main class="wrap" id="view-loading">
  <div class="loading"><span class="spinner"></span>Verificando sessão...</div>
</main>

<!-- LISTA DE PACIENTES -->
<main class="wrap" id="view-patients" hidden>
  <section class="card">
    <div class="detail-header">
      <div>
        <h2>Pacientes <em>do prontuário</em></h2>
        <p class="patient-meta" id="patients-count">—</p>
      </div>
      <button class="btn-primary" id="btn-new-patient">+ Novo paciente</button>
    </div>

    <div class="filters">
      <input type="search" id="search-input" placeholder="Buscar por nome, CPF ou telefone...">
    </div>

    <div id="patients-container">
      <div class="loading"><span class="spinner"></span>Carregando...</div>
    </div>
  </section>
</main>

<!-- DETALHE DO PACIENTE -->
<main class="wrap" id="view-detail" hidden>
  <section class="card">
    <div class="detail-header">
      <div>
        <h2 id="d-name">—</h2>
        <p class="patient-meta" id="d-meta">—</p>
      </div>
      <div class="btn-row">
        <button class="btn-secondary" id="btn-print-prontuario" title="Exportar prontuário completo em PDF">📋 Prontuário completo</button>
        <button class="btn-secondary" id="btn-edit-patient">Editar dados</button>
        <button class="btn-ghost" id="btn-back">← Pacientes</button>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="resumo">Resumo</button>
      <button class="tab-btn" data-tab="historico">Histórico médico</button>
      <button class="tab-btn" data-tab="consultas">Consultas</button>
      <button class="tab-btn" data-tab="documentos">Documentos</button>
    </div>

    <!-- TAB RESUMO -->
    <div class="tab-panel active" data-tab="resumo">
      <div id="d-summary"></div>
    </div>

    <!-- TAB HISTÓRICO -->
    <div class="tab-panel" data-tab="historico">
      <div id="d-history-msg"></div>
      <form id="form-history">
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Comorbidades</label>
            <textarea name="comorbidities" placeholder="HAS, DM2, dislipidemia..."></textarea>
          </div>
          <div class="form-group">
            <label>Alergias</label>
            <textarea name="allergies" placeholder="Penicilina, dipirona... ou 'Nega'"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Medicações em uso</label>
            <textarea name="current_meds" placeholder="Losartana 50mg 1x/dia, Sinvastatina 20mg à noite..."></textarea>
          </div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Antecedentes pessoais</label>
            <textarea name="past_history"></textarea>
          </div>
          <div class="form-group">
            <label>Antecedentes cirúrgicos</label>
            <textarea name="surgical_history"></textarea>
          </div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Antecedentes familiares</label>
            <textarea name="family_history"></textarea>
          </div>
          <div class="form-group">
            <label>Hábitos</label>
            <textarea name="habits" placeholder="Tabagismo, álcool, exercício..."></textarea>
          </div>
        </div>
        <div class="form-row cols-2">
          <div class="form-group">
            <label>Ginecológico/obstétrico</label>
            <textarea name="gyn_obs"></textarea>
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea name="notes"></textarea>
          </div>
        </div>
        <div class="btn-row right">
          <button type="submit" class="btn-primary">Salvar histórico</button>
        </div>
      </form>
    </div>

    <!-- TAB CONSULTAS -->
    <div class="tab-panel" data-tab="consultas">
      <div class="btn-row" style="margin-bottom:16px;">
        <button class="btn-primary" id="btn-new-consult">+ Nova consulta</button>
      </div>
      <div id="d-consults"></div>
    </div>

    <!-- TAB DOCUMENTOS -->
    <div class="tab-panel" data-tab="documentos">
      <div class="doc-creator-grid">
        <button class="doc-creator-btn" data-doctype="receita_simples">
          <span class="ic">℞</span>
          <span class="lbl">Receita simples</span>
          <div class="desc">Medicações comuns</div>
        </button>
        <button class="doc-creator-btn" data-doctype="receita_especial">
          <span class="ic">℞⚠</span>
          <span class="lbl">Receita especial</span>
          <div class="desc">Controlados — Port. 344/98</div>
        </button>
        <button class="doc-creator-btn" data-doctype="exames">
          <span class="ic">🔬</span>
          <span class="lbl">Solicitação de exames</span>
          <div class="desc">Lista de exames + indicação</div>
        </button>
        <button class="doc-creator-btn" data-doctype="atestado">
          <span class="ic">📋</span>
          <span class="lbl">Atestado</span>
          <div class="desc">Afastamento / comparecimento</div>
        </button>
        <button class="doc-creator-btn" data-doctype="laudo">
          <span class="ic">📑</span>
          <span class="lbl">Laudo</span>
          <div class="desc">Laudo neurológico / pericial</div>
        </button>
        <button class="doc-creator-btn" data-doctype="relatorio">
          <span class="ic">📝</span>
          <span class="lbl">Relatório</span>
          <div class="desc">Relatório clínico geral</div>
        </button>
      </div>
      <div id="d-pending-sigs"></div>
      <h4 class="section-title">Histórico de documentos</h4>
      <div id="d-docs"></div>
    </div>
  </section>
</main>

<!-- container para modais -->
<div id="modal-host"></div>

<!-- datalist global de medicamentos (princípio ativo + marcas) -->
<datalist id="med-names"></datalist>

<script>
/* ===========================================================
   CONFIG
=========================================================== */

async function loadHealthPlansDB() {
  const { data, error } = await sb
    .from('emr_health_plans')
    .select('*')
    .order('name', { ascending: true });
  if (error) {
    console.warn('emr_health_plans indisponível — execute a migration SQL:', error.message);
    healthPlans = [];
    return;
  }
  healthPlans = data || [];
}

function buildHealthPlanOptions(currentValue) {
  let html = '<option value="">— Particular / Nenhum —</option>';
  healthPlans.forEach(hp => {
    html += `<option value="${escapeHtml(hp.name)}" ${currentValue === hp.name ? 'selected' : ''}>${escapeHtml(hp.name)}</option>`;
  });
  if (currentValue && !healthPlans.find(hp => hp.name === currentValue)) {
    html += `<option value="${escapeHtml(currentValue)}" selected>${escapeHtml(currentValue)}</option>`;
  }
  return html;
}
function getPatientPlan() {
  if (!currentPatient?.health_plan) return null;
  return healthPlans.find(hp => hp.name === currentPatient.health_plan) || null;
}

      footHTML: `<div style="flex:1"></div>

      onMount: (fm) => {

          const address = fm.querySelector('#hp-address').value.trim();
          const city    = fm.querySelector('#hp-city').value.trim();
          const phone   = fm.querySelector('#hp-phone').value.trim();

            if (existing) {
              const { data, error } = await sb.from('emr_health_plans')

                .eq('id', existing.id).select().single();
              if (error) throw error;
              const idx = healthPlans.findIndex(x => x.id === existing.id);
              if (idx >= 0) healthPlans[idx] = data;

              const { data, error } = await sb.from('emr_health_plans')

          };
        });

      wire();
      m.querySelector('#hp-new').onclick = () => openPlanForm(null, refresh);

=========================================================== */
const CID_LIST = window.CID10 || [];
const CID_INDEX = new Map(CID_LIST.map(([c, d]) => [c, d]));
function searchCID(q) {
  const t = q.trim().toLowerCase();
  if (!t) return [];
  const out = [];
  for (const [c, d] of CID_LIST) {
    if (c.toLowerCase().includes(t) || d.toLowerCase().includes(t)) {
      out.push([c, d]);
      if (out.length >= 50) break;
    }
  }
  return out;
}

const $ = id => document.getElementById(id);
const show = id => { const el = $(id); if (el) el.hidden = false; };
const hide = id => { const el = $(id); if (el) el.hidden = true; };
const setHTML = (id, html) => { const el = $(id); if (el) el.innerHTML = html; };

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function fmtDate(iso, opts) {
  if (!iso) return '—';
  // Strings 'YYYY-MM-DD' são interpretadas como UTC pelo JS, o que em GMT-3
  // mostra um dia a menos. Parse manual para usar fuso local.
  let d;
  if (typeof iso === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(iso)) {
    const [y, mo, da] = iso.split('-').map(Number);
    d = new Date(y, mo - 1, da);
  } else {
    d = new Date(iso);
  }
  return d.toLocaleString('pt-BR', opts || { dateStyle: 'short' });
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
}
/* Converte uma string ISO (UTC) ou Date em "YYYY-MM-DDTHH:MM" no fuso LOCAL,
   formato exigido pelo <input type="datetime-local">. Sem isso, o slice(0,16)
   da string UTC entrega o valor em outro fuso e a hora aparece deslocada. */
function isoToLocalDatetime(iso) {
  if (!iso) return '';
  const d = (iso instanceof Date) ? iso : new Date(iso);
  if (isNaN(d.getTime())) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function age(birth) {
  if (!birth) return null;
  const d = new Date(birth), now = new Date();
  let a = now.getFullYear() - d.getFullYear();
  if (now.getMonth() < d.getMonth() || (now.getMonth() === d.getMonth() && now.getDate() < d.getDate())) a--;
  return a;
}
function todayBR() {
  return new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
}
function toTitleCase(str) {
  if (!str) return str;
  const minors = new Set(['de','da','do','das','dos','e','a','o','as','os','em','na','no','nas','nos','por','para','com','sem','sob','até','von','van','der']);
  return str.trim().replace(/\S+/g, (word, offset) => {
    const lower = word.toLowerCase();
    if (offset !== 0 && minors.has(lower)) return lower;
    return lower.charAt(0).toUpperCase() + lower.slice(1);
  });
}

function numberToWords(n) {
  // simples (0–99) — suficiente p/ dias de afastamento e quantidades
  const u = ['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez',
             'onze','doze','treze','catorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const d = ['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  n = Math.max(0, Math.floor(Number(n) || 0));
  if (n < 20) return u[n];
  if (n < 100) {
    const dz = Math.floor(n/10), un = n % 10;
    return un ? `${d[dz]} e ${u[un]}` : d[dz];
  }
  return String(n);
}
function setMsg(el, type, text) {
  if (typeof el === 'string') el = $(el);
  if (!el) return;
  el.innerHTML = text ? `<div class="msg ${type}">${escapeHtml(text)}</div>` : '';
}
function alertErr(err) {
  console.error(err);
  alert('Erro: ' + (err?.message || err));
}

async function init() {
  populateMedDatalist();
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/medico/'; return; }
  await onSignedIn(session.user);
  sb.auth.onAuthStateChange((e) => { if (e === 'SIGNED_OUT') window.location.href = '/medico/'; });
}

function populateMedDatalist() {
  const dl = document.getElementById('med-names');
  if (!dl || !window.MEDICATIONS) return;
  const opts = [];
  for (const m of window.MEDICATIONS) {
    opts.push(`<option value="${escapeHtml(m.name)}"></option>`);
    for (const a of (m.aliases || [])) {
      opts.push(`<option value="${escapeHtml(a + ' (' + m.name + ')')}"></option>`);
    }
  }
  dl.innerHTML = opts.join('');
}

function findMedication(rawValue) {
  if (!rawValue || !window.MED_INDEX) return null;
  let v = rawValue.trim();
  // se vier como "Marca (Princípio)", pega o que está entre parênteses
  const paren = v.match(/\(([^)]+)\)\s*$/);
  if (paren) v = paren[1].trim();
  const exact = window.MED_INDEX.get(v.toLowerCase());
  if (exact) return exact;
  // fuzzy: começa com
  const lower = v.toLowerCase();
  for (const [k, m] of window.MED_INDEX.entries()) {
    if (k.startsWith(lower) && lower.length >= 3) return m;
  }
  return null;
}

async function onSignedIn(user) {
  currentUser = user;
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (error || !profile || profile.role !== 'doctor') {
    await sb.auth.signOut();
    window.location.href = '/medico/';
    return;
  }
  currentProfile = profile;
  $('topbar-actions').innerHTML = `
    <a class="btn-link" href="/medico/">← MENU PRINCIPAL</a>
    <button class="btn-icp" id="btn-pending-global" title="Ver todos os documentos pendentes de assinatura" style="display:none;">⏳ <span id="pending-count">0</span> pendentes</button>
    <button class="btn-icp" id="btn-icp" title="Carregar certificado ICP-Brasil para assinar documentos">🔏 ICP-Brasil</button>
    <button class="btn-link" id="btn-ai-config" title="Configurar IA">⚙ IA</button>
    <span class="topbar-user">Dr(a). ${escapeHtml(profile.full_name.split(' ')[0])}</span>
    <button class="btn-link" id="btn-logout">Sair</button>
  `;
  $('btn-pending-global').onclick = openGlobalPendingModal;
  $('btn-icp').onclick = openCertModal;
  $('btn-ai-config').onclick = openAIConfig;
  $('btn-logout').onclick = async () => { await sb.auth.signOut(); };
  autoLoadCert();
  refreshGlobalPendingCount();

  // heartbeat: refresca token silenciosamente a cada 10 min — evita logout por inatividade
  setInterval(() => sb.auth.getSession(), 10 * 60 * 1000);

  hide('view-loading');
  show('view-patients');
  await Promise.all([loadPatients(), loadCustomExamGroups(), loadHealthPlansDB()]);
}

        const f = modal.querySelector('#form-patient');
        if (!f.reportValidity()) return;
        const fd = new FormData(f);
        const payload = {};
        for (const [k, v] of fd.entries()) {
          if (k === 'full_name') payload[k] = toTitleCase(v) || null;
          else payload[k] = v.trim() === '' ? null : v.trim();
        }
        try {
          if (isNew) {
            payload.created_by = currentUser.id;
            const { data, error } = await sb.from('emr_patients').insert(payload).select().single();
            if (error) throw error;
            closeModal();
            await loadPatients();
            openPatient(data.id);
          } else {
            const { error } = await sb.from('emr_patients').update(payload).eq('id', p.id);
            if (error) throw error;
            closeModal();
            await openPatient(p.id);
          }
        } catch (err) { alertErr(err); }
      };
      const del = modal.querySelector('#btn-del-patient');
      if (del) del.onclick = async () => {
        if (!confirm(`Excluir definitivamente o paciente ${p.full_name}? Todos os atendimentos e documentos serão removidos.`)) return;
        try {
          const { error } = await sb.from('emr_patients').delete().eq('id', p.id);
          if (error) throw error;
          closeModal();
          backToList();
          await loadPatients();
        } catch (err) { alertErr(err); }
      };
    }
  });
}

async function openPatient(id) {
  hide('view-patients');
  show('view-detail');
  setHTML('d-summary', `<div class="loading"><span class="spinner"></span>Carregando...</div>`);
  setHTML('d-consults', '');
  setHTML('d-docs', '');
  switchTab('resumo');

  const [pat, hist, cons, docs] = await Promise.all([
    sb.from('emr_patients').select('*').eq('id', id).single(),
    sb.from('emr_medical_history').select('*').eq('patient_id', id).maybeSingle(),
    sb.from('emr_consultations').select('*').eq('patient_id', id).order('consultation_date', { ascending: false }),
    sb.from('emr_documents').select('*').eq('patient_id', id).order('issue_date', { ascending: false })
  ]);
  if (pat.error) { alertErr(pat.error); backToList(); return; }
  currentPatient = pat.data;
  currentHistory = hist.data || null;
  currentConsults = cons.data || [];
  currentDocs = docs.data || [];

  $('d-name').textContent = currentPatient.full_name;
  const bits = [
    currentPatient.birth_date ? `${age(currentPatient.birth_date)} anos` : null,
    currentPatient.sex ? ({F:'Feminino',M:'Masculino',O:'Outro'}[currentPatient.sex]) : null,
    currentPatient.phone || null,
    currentPatient.cpf ? `CPF ${currentPatient.cpf}` : null
  ].filter(Boolean);
  $('d-meta').textContent = bits.join(' · ') || '—';

  renderSummary();
  fillHistoryForm();
  renderConsults();
  renderDocs();
}

}

function fillHistoryForm() {
  const h = currentHistory || {};
  const f = $('form-history');
  ['comorbidities','allergies','current_meds','past_history','surgical_history',
   'family_history','habits','gyn_obs','notes'].forEach(k => {
    if (f.elements[k]) f.elements[k].value = h[k] || '';
  });
}

$('form-history').onsubmit = async (e) => {
  e.preventDefault();
  setMsg('d-history-msg','','');
  const fd = new FormData(e.target);
  const payload = { patient_id: currentPatient.id };
  for (const [k, v] of fd.entries()) payload[k] = v.trim() === '' ? null : v.trim();
  try {
    const { error } = await sb.from('emr_medical_history').upsert(payload);
    if (error) throw error;
    currentHistory = payload;
    renderSummary();
    setMsg('d-history-msg','success','Histórico salvo.');
    setTimeout(() => setMsg('d-history-msg','',''), 2500);
  } catch (err) { alertErr(err); }
};

$('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.tab);
});
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === name));
  if (name === 'documentos') renderPendingSignatures();
}

/* ===========================================================
   CONSULTAS
=========================================================== */
function renderConsults() {
  if (!currentConsults.length) {
    setHTML('d-consults', `<div class="empty-state">Nenhuma consulta registrada.</div>`);
    return;
  }
  const TYPES = { primeira:'Primeira consulta', retorno:'Retorno', urgencia:'Urgência', teleconsulta:'Teleconsulta' };
  setHTML('d-consults', currentConsults.map(c => {
    const signed = !!c.is_signed;
    const cids = (c.cid_codes || []).map(x => `<span class="cid-tag">${escapeHtml(x)}</span>`).join(' ');
    const summary = [
      c.chief_complaint ? `<strong>QP:</strong> ${escapeHtml(c.chief_complaint)}` : null,
      c.hypothesis ? `<strong>HD:</strong> ${escapeHtml(c.hypothesis)}` : null,
      c.plan ? `<strong>Conduta:</strong> ${escapeHtml(c.plan).slice(0,200)}${c.plan.length>200?'…':''}` : null
    ].filter(Boolean).join('<br>');
    const signedAt = c.signed_at ? ` · Assinado em ${fmtDate(c.signed_at)}` : '';
    const sigBadge = signed
      ? `<span style="font-size:0.7rem;background:#f0faf5;color:#2d6a4f;border:1px solid #a0d4b8;padding:2px 7px;" title="Assinado digitalmente${signedAt}">✓ assinado</span>`
      : `<span style="font-size:0.7rem;background:#fff8e6;color:#8a5c00;border:1px solid #f0d080;padding:2px 7px;">pendente</span>`;
    const signBtn = !signed && sigState.loaded
      ? `<button class="btn-ghost" data-act="sign" style="color:var(--steel);border:1px solid var(--steel);padding:4px 8px;">🔏 Assinar</button>`
      : '';
    return `
      <div class="consult-card" data-id="${c.id}" data-signed="${signed}">
        <div class="consult-head">
          <div>
            <span class="consult-date">${fmtDateTime(c.consultation_date)}</span>
            <span class="consult-type">${TYPES[c.type] || c.type}</span>
            ${sigBadge}
          </div>
          <div class="cid-row">${cids}</div>
        </div>
        <div class="consult-body">${summary || '<em>Sem dados estruturados.</em>'}</div>
        <div class="consult-actions">
          <button class="btn-ghost" data-act="view">Ver completa</button>
          ${!signed ? `<button class="btn-ghost" data-act="edit">Editar</button>` : `<span style="font-size:0.75rem;color:var(--gray);padding:0 4px;" title="Consulta assinada — edição bloqueada">🔒</span>`}
          <button class="btn-ghost" data-act="pdf">PDF</button>
          ${signBtn}
          ${!signed ? `<button class="btn-ghost" data-act="del" style="color:var(--danger)">Excluir</button>` : ''}
        </div>
      </div>`;
  }).join(''));
  document.querySelectorAll('#d-consults .consult-card').forEach(card => {
    const id = card.dataset.id;
    const c = currentConsults.find(x => x.id === id);
    card.querySelector('[data-act="view"]').onclick = () => viewConsult(c);
    const editBtn = card.querySelector('[data-act="edit"]');
    if (editBtn) editBtn.onclick = () => openConsultForm(c);
    card.querySelector('[data-act="pdf"]').onclick = async () => {
      if (c.is_signed) await applyReplayStamp('emr_consultations', c.id);
      generateConsultPDF(c);
    };
    const signBtn = card.querySelector('[data-act="sign"]');
    if (signBtn) signBtn.onclick = () => {
      if (!sigState.loaded) { openCertModal(); return; }
      sigState.signingNow = true;
      sigState.pendingSourceTable = 'emr_consultations';
      sigState.pendingSourceId = c.id;
      generateConsultPDF(c);
    };
    const delBtn = card.querySelector('[data-act="del"]');
    if (delBtn) delBtn.onclick = async () => {
      if (!confirm('Excluir esta consulta?')) return;
      const { error } = await sb.from('emr_consultations').delete().eq('id', id);
      if (error) return alertErr(error);
      currentConsults = currentConsults.filter(x => x.id !== id);
      renderConsults(); renderSummary();
    };
  });
}

              <button type="button" class="btn-ghost ai-btn" data-ai="hypothesis" style="float:right;font-size:0.7rem;">✨ IA</button>

            <div id="cid-tags" class="cid-row" style="margin-bottom:6px;"></div>

      <span id="autosave-status" style="font-size:0.74rem;color:#8a9bb0;align-self:center;"></span>

    onMount: (modal) => {
      const tagWrap = modal.querySelector('#cid-tags');

        tagWrap.innerHTML = cidCodes.map((code, i) =>
          `<span class="cid-tag">${escapeHtml(code)}<button class="cid-tag-x" data-i="${i}" type="button" aria-label="Remover">×</button></span>`

      };
      renderTags();

      const cidInput = modal.querySelector('#cid-search');
      cidInput.addEventListener('change', () => {
        const v = cidInput.value.trim();
        if (!v) return;
        const code = v.split('—')[0].trim().toUpperCase();
        if (code && !cidCodes.includes(code)) { cidCodes.push(code); renderTags(); }
        cidInput.value = '';
      });

      modal.querySelectorAll('[data-tpl]').forEach(b => {
        b.onclick = () => {
          const target = b.dataset.tpl === 'phys' ? 'physical_exam' : 'neuro_exam';
          const t = b.dataset.tpl === 'phys' ? PHYSICAL_NORMAL : NEURO_NORMAL;
          const ta = modal.querySelector(`textarea[name="${target}"]`);
          if (ta.value.trim()) {
            if (!confirm('Substituir conteúdo atual pelo template?')) return;
          }
          ta.value = t;
        };
      });

      modal.querySelector('#btn-scales').onclick = () => openScalesPicker((txt) => {
        const ta = modal.querySelector('textarea[name="neuro_exam"]');
        ta.value = (ta.value ? ta.value + '\n\n' : '') + txt;
      });

      // botões IA — organizar texto do campo
      modal.querySelectorAll('.ai-btn').forEach(b => {
        b.onclick = () => {
          const fieldName = b.dataset.ai;
          const ta = modal.querySelector(`textarea[name="${fieldName}"]`);
          if (!ta) return;
          if (!ta.value.trim()) { alert('Digite algo no campo antes de pedir para a IA organizar.'); return; }
          organizeWithAI(ta.value, fieldName, (newText) => { ta.value = newText; });
        };
      });

      // ---- AUTO-SAVE ----
      let draftId = isNew ? null : (c?.id || null);

      const collectPayload = () => {
        const f = modal.querySelector('#form-consult');
        if (!f) return null;
        const fd = new FormData(f);
        const p = { patient_id: currentPatient.id, cid_codes: cidCodes };
        for (const [k, v] of fd.entries()) {
          if (k === 'consultation_date') { try { p[k] = new Date(v).toISOString(); } catch { p[k] = null; } }
          else p[k] = v.trim() === '' ? null : v.trim();
        }
        return p;
      };

      const setStatus = (msg) => {
        const el = modal.querySelector('#autosave-status');
        if (el) el.textContent = msg;
      };

      const autoSave = async () => {
        if (!modal.isConnected) return;
        const payload = collectPayload();
        if (!payload) return;
        try {
          if (!draftId) {
            const { data, error } = await sb.from('emr_consultations').insert(payload).select().single();
            if (error) throw error;
            draftId = data.id;
            currentConsults.unshift(data);
          } else {
            const { data, error } = await sb.from('emr_consultations')
              .update(payload).eq('id', draftId).select().single();
            if (error) throw error;
            const idx = currentConsults.findIndex(x => x.id === draftId);
            if (idx >= 0) currentConsults[idx] = data;
          }
          const t = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          setStatus(`Salvo automaticamente às ${t}`);
        } catch (err) {
          console.warn('[autosave]', err);
          setStatus('Falha no auto-save');
        }
      };

      const autoSaveTimer = setInterval(autoSave, 30000);

      // para o intervalo quando o modal fechar
      const asObs = new MutationObserver(() => {
        if (!modal.isConnected) { clearInterval(autoSaveTimer); asObs.disconnect(); }
      });
      asObs.observe(document.body, { childList: true });

      // ---- SALVAR MANUAL ----
      modal.querySelector('#btn-save-consult').onclick = async () => {
        clearInterval(autoSaveTimer); asObs.disconnect();
        const f = modal.querySelector('#form-consult');
        if (!f.reportValidity()) { setInterval(autoSave, 30000); return; }
        const payload = collectPayload();
        setStatus('Salvando…');
        try {
          if (!draftId) {
            // nova consulta sem draft: insere agora
            const { data: ins, error } = await sb.from('emr_consultations').insert(payload).select().single();
            if (error) throw error;
            currentConsults.unshift(ins);
          } else {
            // draft ou edição existente: atualiza
            const { data: upd, error } = await sb.from('emr_consultations')
              .update(payload).eq('id', draftId).select().single();
            if (error) throw error;
            const idx = currentConsults.findIndex(x => x.id === draftId);
            if (idx >= 0) currentConsults[idx] = upd;
            else currentConsults.unshift(upd);
          }
          closeModal();
          renderConsults();
          renderSummary();
        } catch (err) { alertErr(err); }
      };

      // Botão "Salvar e assinar" — salva no Supabase, obtém id, gera PDF assinado
      const signConsultBtn = modal.querySelector('#btn-sign-consult');
      if (signConsultBtn) signConsultBtn.onclick = async () => {
        clearInterval(autoSaveTimer); asObs.disconnect();
        const f = modal.querySelector('#form-consult');
        if (!f.reportValidity()) return;
        const payload = collectPayload();
        signConsultBtn.disabled = true; signConsultBtn.textContent = 'Salvando…';
        try {
          let saved;
          if (!draftId) {
            const { data, error } = await sb.from('emr_consultations').insert(payload).select().single();
            if (error) throw error;
            saved = data;
            currentConsults.unshift(saved);
          } else {
            const { data, error } = await sb.from('emr_consultations').update(payload).eq('id', draftId).select().single();
            if (error) throw error;
            saved = data;
            const idx = currentConsults.findIndex(x => x.id === draftId);
            if (idx >= 0) currentConsults[idx] = saved;
            else currentConsults.unshift(saved);
          }
          // Gera PDF com assinatura vinculada ao id salvo
          sigState.signingNow         = true;
          sigState.pendingSourceTable = 'emr_consultations';
          sigState.pendingSourceId    = saved.id;
          generateConsultPDF(saved);
          closeModal();
          renderConsults();
          renderSummary();
        } catch (err) {
          alertErr(err);
          signConsultBtn.disabled = false; signConsultBtn.textContent = '🔏 Salvar e assinar';
        }
      };
    }
  });
}

/* ---- helpers comuns ---- */
function _openLikertScale({ title, intro, options, items, footnote, categorize, onApply }) {
  const html = items.map((q, i) => `
    <div class="form-row" style="margin-bottom:6px;">
      <div class="form-group">
        <label>${i + 1}. ${escapeHtml(q)}</label>
        <select data-i="${i}">
          ${options.map(o => `<option value="${o[0]}">${o[0]} — ${escapeHtml(o[1])}</option>`).join('')}
        </select>
      </div>
    </div>`).join('');
  openModal({
    title,
    size:'lg',
    bodyHTML:`
      <p style="font-size:0.86rem;color:#5a6f85;margin-bottom:14px;">${escapeHtml(intro)}</p>
      <div style="max-height:55vh;overflow-y:auto;padding-right:8px;">${html}</div>
      <div class="calc-result" id="r-out"></div>
      ${footnote ? `<p class="form-hint" style="margin-top:8px;">${escapeHtml(footnote)}</p>` : ''}
    `,
    footHTML:`
      <div style="flex:1"></div>
      <button class="btn-secondary" data-close>Cancelar</button>
      <button class="btn-primary" id="r-apply">Inserir resultado</button>
    `,
    onMount:(m) => {
      const calc = () => {
        let total = 0;
        m.querySelectorAll('select[data-i]').forEach(s => total += +s.value);
        const c = categorize(total);
        m.querySelector('#r-out').innerHTML = `<strong>${title}: ${total} ponto${total===1?'':'s'}</strong> — ${escapeHtml(c)}`;
        return { total, cat: c };
      };
      m.querySelectorAll('select[data-i]').forEach(s => s.onchange = calc);
      calc();
      m.querySelector('#r-apply').onclick = () => {
        const r = calc();
        onApply(`${title}: ${r.total} ponto${r.total===1?'':'s'} — ${r.cat}.`);
        closeModal();
      };
    }
  });
}

            <option value="9+">9+ anos</option>
          </select>
        </div>
      </div>
      <div class="calc-result" id="meem-out"></div>
      <p class="form-hint" style="margin-top:8px;">

    `,

      const cuts = { 'analfabeto':20, '1-4':25, '5-8':26, '9+':28 };
      const calc = () => {
        let total = 0;
        inputs.forEach(i => {
          const max = +i.dataset.max;
          let v = +i.value || 0; if (v < 0) v = 0; if (v > max) v = max;
          total += v;
        });
        const cut = cuts[eduSel.value];
        const flag = total < cut ? `<strong>abaixo do corte para ${eduSel.value} anos (${cut})</strong>` : `acima/no corte para ${eduSel.value} anos (${cut})`;
        out.innerHTML = `<strong>MEEM ${total}/30</strong> — ${flag}.`;
        return { total, cut, edu: eduSel.value };

      inputs.forEach(i => i.oninput = calc);
      eduSel.onchange = calc;
      calc();
      m.querySelector('#meem-apply').onclick = () => {
        const r = calc();
        const flag = r.total < r.cut ? 'abaixo do corte' : 'sem rebaixamento pelo corte';
        onApply(`MEEM: ${r.total}/30 (escolaridade ${r.edu} anos; corte ${r.cut}) — ${flag}.`);
        closeModal();
      };
    }
  });
}

/* Busca a assinatura original de um documento/consulta já assinado e configura
   sigState para que pdfSave reproduza o carimbo com os dados históricos (sem
   criar novo registro no Supabase). */
async function applyReplayStamp(sourceTable, sourceId) {
  try {
    const { data: sig } = await sb
      .from('document_signatures')
      .select('id, cert_cn, cert_issuer, cert_serial, signed_at')
      .eq('source_table', sourceTable)
      .eq('source_id', sourceId)
      .order('signed_at', { ascending: true })
      .limit(1)
      .single();
    if (sig) {
      sigState.replayStamp = {
        verifyId: sig.id,
        cn:       sig.cert_cn      || '',
        issuer:   sig.cert_issuer  || '',
        serial:   sig.cert_serial  || '',
        signedAt: sig.signed_at,
      };
      sigState.signingNow = true;
    }
  } catch (_) {}
}

function renderDocs() {
  if (!currentDocs.length) {
    setHTML('d-docs', `<div class="empty-state">Nenhum documento emitido.</div>`);
    renderPendingSignatures();
    return;
  }
  const TYPE_LABELS = {
    receita_simples:'Receita simples', receita_especial:'Receita especial',
    exames:'Solicitação de exames', atestado:'Atestado',
    laudo:'Laudo', relatorio:'Relatório'
  };
  setHTML('d-docs', currentDocs.map(d => {
    const signed = !!d.is_signed;
    const signedAt = d.signed_at ? ` · Assinado em ${fmtDate(d.signed_at)}` : '';
    const signBtn = !signed && sigState.loaded
      ? `<button class="btn-ghost" data-act="sign" style="color:var(--steel);border:1px solid var(--steel);padding:4px 8px;">🔏 Assinar</button>`
      : '';
    const pendingBadge = !signed
      ? `<span style="font-size:0.7rem;background:#fff8e6;color:#8a5c00;border:1px solid #f0d080;padding:2px 7px;margin-left:6px;">pendente</span>`
      : `<span style="font-size:0.7rem;background:#f0faf5;color:#2d6a4f;border:1px solid #a0d4b8;padding:2px 7px;margin-left:6px;" title="Assinado digitalmente${signedAt}">✓ assinado</span>`;
    return `
    <div class="doc-row" data-id="${d.id}" data-signed="${signed}">
      <div class="doc-date">${fmtDate(d.issue_date)}</div>
      <div><span class="doc-type-badge ${d.type}">${TYPE_LABELS[d.type] || d.type}</span>${pendingBadge}</div>
      <div>${escapeHtml(d.title || '—')}</div>
      <div class="doc-actions">
        ${!signed ? `<button class="btn-ghost" data-act="edit">Editar</button>` : `<span style="font-size:0.75rem;color:var(--gray);padding:0 4px;" title="Documento assinado — edição bloqueada">🔒</span>`}
        <button class="btn-ghost" data-act="pdf">PDF</button>
        ${signBtn}
        ${!signed ? `<button class="btn-ghost" data-act="del" style="color:var(--danger)">Excluir</button>` : ''}
      </div>
    </div>`;
  }).join(''));
  document.querySelectorAll('#d-docs .doc-row').forEach(row => {
    const id = row.dataset.id;
    const d = currentDocs.find(x => x.id === id);
    const editBtn = row.querySelector('[data-act="edit"]');
    if (editBtn) editBtn.onclick = () => openDocForm(d.type, d);
    row.querySelector('[data-act="pdf"]').onclick = async () => {
      if (d.is_signed) await applyReplayStamp('emr_documents', d.id);
      generateDocPDF(d);
    };
    const signBtn = row.querySelector('[data-act="sign"]');
    if (signBtn) signBtn.onclick = () => {
      if (!sigState.loaded) { openCertModal(); return; }
      sigState.signingNow = true;
      sigState.pendingSourceTable = 'emr_documents';
      sigState.pendingSourceId = d.id;
      generateDocPDF(d);
    };
    const delBtn = row.querySelector('[data-act="del"]');
    if (delBtn) delBtn.onclick = async () => {
      if (!confirm('Excluir este documento?')) return;
      const { error } = await sb.from('emr_documents').delete().eq('id', id);
      if (error) return alertErr(error);
      currentDocs = currentDocs.filter(x => x.id !== id);
      renderDocs(); renderSummary();
    };
  });
  renderPendingSignatures();
}

  const pendingConsults = (currentConsults || []).filter(c => !c.is_signed);

  };

  const certTip = sigState.loaded

      <div class="doc-actions">
        <button class="btn-ghost" data-act="pdf">PDF</button>
        ${sigState.loaded ? `<button class="btn-ghost" data-act="sign" style="color:var(--steel);border:1px solid var(--steel);padding:4px 8px;">🔏 Assinar</button>` : ''}
      </div>
    </div>`).join('');

  const consultRows = pendingConsults.map(c => `
    <div class="doc-row" data-id="${c.id}" data-kind="consult" style="background:#fffef5;">
      <div class="doc-date">${fmtDate(c.consultation_date)}</div>
      <div><span class="doc-type-badge">${CONSULT_TYPES[c.type] || c.type}</span></div>

  // Botão para abrir modal do cert caso não carregado
  const certLink = container.querySelector('#btn-load-cert-pending');

  // Bind de ações
  container.querySelectorAll('.doc-row').forEach(row => {

/* ===========================================================
   PENDENTES DE ASSINATURA — visão global (todos os pacientes)
=========================================================== */
async function loadGlobalPending() {
  const [docsRes, consultsRes] = await Promise.all([
    sb.from('emr_documents')
      .select('id, type, title, issue_date, patient_id, emr_patients(full_name)')
      .eq('is_signed', false)
      .order('issue_date', { ascending: false }),
    sb.from('emr_consultations')
      .select('id, type, consultation_date, chief_complaint, hypothesis, patient_id, emr_patients(full_name)')
      .eq('is_signed', false)
      .order('consultation_date', { ascending: false }),
  ]);
  const docs     = (docsRes.data    || []).map(d => ({ ...d, _kind: 'doc',     _patientName: d.emr_patients?.full_name || '—' }));
  const consults = (consultsRes.data || []).map(c => ({ ...c, _kind: 'consult', _patientName: c.emr_patients?.full_name || '—' }));
  return [...docs, ...consults].sort((a, b) => {
    const da = a.issue_date || a.consultation_date || '';
    const db = b.issue_date || b.consultation_date || '';
    return db.localeCompare(da);
  });
}

async function refreshGlobalPendingCount() {
  const btn   = document.getElementById('btn-pending-global');
  const badge = document.getElementById('pending-count');
  if (!btn || !badge) return;
  try {
    const [d, c] = await Promise.all([
      sb.from('emr_documents').select('id', { count: 'exact', head: true }).eq('is_signed', false),
      sb.from('emr_consultations').select('id', { count: 'exact', head: true }).eq('is_signed', false),
    ]);
    const total = (d.count || 0) + (c.count || 0);
    badge.textContent = total;
    btn.style.display = total > 0 ? '' : 'none';
    btn.className = total > 0 ? 'btn-icp cert-exp' : 'btn-icp';
  } catch (_) {}
}

async function signItemSilently(item) {
  // Carrega dados completos do paciente se necessário
  let patient = (currentPatient?.id === item.patient_id) ? currentPatient : null;
  if (!patient) {
    const { data } = await sb.from('emr_patients').select('*').eq('id', item.patient_id).single();
    patient = data;
  }
  if (!patient) throw new Error('Paciente não encontrado');

  const savedPatient = currentPatient;
  currentPatient = patient;

  return new Promise((resolve, reject) => {
    sigState._resolve    = resolve;
    sigState.signingNow  = true;
    sigState.silentMode  = true;
    sigState.pendingSourceTable = item._kind === 'doc' ? 'emr_documents' : 'emr_consultations';
    sigState.pendingSourceId    = item.id;
    try {
      if (item._kind === 'doc') generateDocPDF(item);
      else                      generateConsultPDF(item);
    } catch (err) {
      sigState._resolve = null;
      currentPatient = savedPatient;
      reject(err);
    }
    // Após a promise ser resolvida (pelo finally de pdfSave), restaura paciente
    Promise.resolve().then(() => {
      // Aguarda a resolução do _resolve antes de restaurar
    });
  }).finally(() => {
    currentPatient = savedPatient;
  });
}

async function openGlobalPendingModal() {
  if (!sigState.loaded) { openCertModal(); return; }

  openModal({
    title: 'Pendentes de assinatura — todos os pacientes',
    size: 'lg',
    bodyHTML: `<div style="text-align:center;padding:24px;color:var(--gray);">
      <span class="spinner" style="display:inline-block;margin-right:8px;"></span>Carregando…
    </div>`,
    footHTML: `<button class="btn-secondary" data-close>Fechar</button>`,
  });

  let items;
  try { items = await loadGlobalPending(); }
  catch (err) { alertErr(err); return; }

  // Encontra o modal aberto e atualiza o body
  const wrapper = document.querySelector('.modal-bg:last-child');
  if (!wrapper) return;
  const body = wrapper.querySelector('.modal-body');
  const foot = wrapper.querySelector('.modal-foot');

  const TYPE_LABELS = {
    receita_simples:'Receita simples', receita_especial:'Receita especial',
    exames:'Solicitação de exames', atestado:'Atestado', laudo:'Laudo', relatorio:'Relatório',
    primeira:'Primeira consulta', retorno:'Retorno', urgencia:'Urgência', teleconsulta:'Teleconsulta',
  };

  if (!items.length) {
    body.innerHTML = `<div class="empty-state">Nenhum documento pendente de assinatura.</div>`;
    return;
  }

  body.innerHTML = `
    <p style="font-size:0.84rem;color:#5a6f85;margin-bottom:14px;">
      ${items.length} item(s) aguardando assinatura digital ICP-Brasil.
      O botão <strong>Assinar todos</strong> assina em sequência, sem download — apenas registra a assinatura digital.
    </p>
    <div id="global-pending-list">
      ${items.map((item, idx) => {
        const date  = fmtDate(item.issue_date || item.consultation_date);
        const label = TYPE_LABELS[item.type] || item.type;
        const title = item._kind === 'doc'
          ? (item.title || label)
          : (item.chief_complaint || item.hypothesis || label);
        return `
        <div class="doc-row" data-idx="${idx}" id="gp-row-${idx}" style="align-items:center;">
          <div class="doc-date">${date}</div>
          <div style="font-size:0.8rem;color:var(--gray);">${escapeHtml(item._patientName)}</div>
          <div>
            <span class="doc-type-badge ${item.type}">${label}</span>
            <span style="margin-left:6px;font-size:0.85rem;">${escapeHtml(title.slice(0,60))}</span>
          </div>
          <div class="doc-actions">
            <span id="gp-status-${idx}" style="font-size:0.78rem;color:var(--gray);"></span>
            <button class="btn-ghost" data-idx="${idx}" data-act="sign-one"
              style="color:var(--steel);border:1px solid var(--steel);padding:4px 8px;">🔏 Assinar</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  foot.innerHTML = `
    <button class="btn-secondary" data-close>Fechar</button>
    <button class="btn-primary" id="btn-sign-all">🔏 Assinar todos (${items.length})</button>`;
  // rebind close
  foot.querySelector('[data-close]').onclick = () => closeModal();

  const setRowStatus = (idx, html) => {
    const el = document.getElementById(`gp-status-${idx}`);
    if (el) el.innerHTML = html;
  };
  const disableSignBtn = (idx) => {
    const btn = body.querySelector(`[data-idx="${idx}"][data-act="sign-one"]`);
    if (btn) btn.disabled = true;
  };

  // Assinar individualmente
  body.querySelectorAll('[data-act="sign-one"]').forEach(btn => {
    btn.onclick = async () => {
      const idx  = +btn.dataset.idx;
      const item = items[idx];
      btn.disabled = true;
      setRowStatus(idx, '⏳');
      try {
        await signItemSilently(item);
        setRowStatus(idx, '<span style="color:#2d6a4f;">✓ assinado</span>');
        items.splice(idx, 1); // remove da lista local
        refreshGlobalPendingCount();
      } catch (err) {
        setRowStatus(idx, `<span style="color:var(--danger);">✗ falha</span>`);
        btn.disabled = false;
        console.warn('[ICP global]', err.message);
      }
    };
  });

  // Assinar todos
  foot.querySelector('#btn-sign-all').onclick = async () => {
    const allBtns = foot.querySelector('#btn-sign-all');
    allBtns.disabled = true;
    allBtns.textContent = '⏳ Assinando…';
    let ok = 0, fail = 0;
    const pending = [...items.keys()]; // índices ainda não assinados
    for (const idx of pending) {
      const item = items[idx];
      if (!item) continue;
      disableSignBtn(idx);
      setRowStatus(idx, '⏳');
      try {
        await signItemSilently(item);
        setRowStatus(idx, '<span style="color:#2d6a4f;">✓ assinado</span>');
        ok++;
      } catch (err) {
        setRowStatus(idx, `<span style="color:var(--danger);" title="${escapeHtml(err.message)}">✗ falha</span>`);
        fail++;
      }
    }
    allBtns.textContent = `✓ Concluído — ${ok} assinado(s)${fail ? `, ${fail} falha(s)` : ''}`;
    showToast(`${ok} documento(s) assinado(s) digitalmente — ICP-Brasil ✓`);
    refreshGlobalPendingCount();
    if (currentPatient) { renderDocs(); renderConsults(); renderPendingSignatures(); }
  };
}

          <input id="ex-cid" placeholder="ex: G43.9" value="${escapeHtml(c.cid || '')}">
        </div>
      </div>
    `;
    getContent = (m) => {
      const list = [];
      m.querySelectorAll('.exam-editor').forEach(ed => {
        const name = ed.querySelector('[data-f=name]').value.trim();
        const specs = ed.querySelector('[data-f=specs]').value.trim();

        exams: list,

        indication: m.querySelector('#ex-indication').value.trim(),
        cid: m.querySelector('#ex-cid').value.trim()
      };
    };
  }

  else if (type === 'atestado') {
    defaultTitle = 'Atestado médico';
    bodyHTML = `
      <div class="form-row cols-2">
        <div class="form-group">
          <label>Tipo</label>
          <select id="at-subtype">
            <option value="afastamento" ${c.subtype==='afastamento'?'selected':''}>Afastamento de atividades</option>
            <option value="comparecimento" ${c.subtype==='comparecimento'?'selected':''}>Comparecimento à consulta</option>
            <option value="acompanhante" ${c.subtype==='acompanhante'?'selected':''}>Acompanhante</option>
            <option value="aptidao" ${c.subtype==='aptidao'?'selected':''}>Aptidão / capacidade</option>
            <option value="outro" ${c.subtype==='outro'?'selected':''}>Outro (texto livre)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Dias de afastamento (se aplicável)</label>
          <input type="number" id="at-days" min="0" value="${c.days ?? ''}">
        </div>
      </div>
      <div class="form-row cols-2" id="at-companion-row" ${c.subtype==='acompanhante'?'':'hidden'}>
        <div class="form-group">
          <label>Nome do acompanhante *</label>
          <input id="at-companion-name" value="${escapeHtml(c.companion_name || '')}" placeholder="Nome completo do acompanhante">
        </div>
        <div class="form-group">
          <label>Vínculo com o paciente</label>
          <input id="at-companion-rel" value="${escapeHtml(c.companion_relation || '')}" placeholder="ex: filho(a), cônjuge, mãe">
        </div>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label>CID-10 (opcional)</label>
          <input id="at-cid" placeholder="ex: G43.0" value="${escapeHtml(c.cid || '')}">
          <span class="form-hint">Só será impresso se o paciente autorizar.</span>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="at-include-cid" ${c.include_cid ? 'checked' : ''} style="width:auto;">
            Imprimir CID no atestado
          </label>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Texto adicional / motivo</label>
          <textarea id="at-free" placeholder="Detalhes ou texto completo se 'outro'.">${escapeHtml(c.free_text || '')}</textarea>
        </div>
      </div>
    `;
    getContent = (m) => ({
      subtype: m.querySelector('#at-subtype').value,
      days: m.querySelector('#at-days').value ? +m.querySelector('#at-days').value : null,
      companion_name: m.querySelector('#at-companion-name')?.value.trim() || '',
      companion_relation: m.querySelector('#at-companion-rel')?.value.trim() || '',
      cid: m.querySelector('#at-cid').value.trim(),
      include_cid: m.querySelector('#at-include-cid').checked,
      free_text: m.querySelector('#at-free').value.trim()
    });
  }

  else if (type === 'laudo') {
    defaultTitle = 'Laudo neurológico';
    bodyHTML = `
      <div class="form-row">
        <div class="btn-row">
          <button type="button" class="btn-secondary" id="laudo-ai">
            ✨ Gerar laudo com IA a partir das consultas
          </button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Conteúdo do laudo</label>
          <textarea id="lo-body" style="min-height:340px;" placeholder="Digite o laudo livremente, ou use o botão acima para gerar a partir das consultas registradas.">${escapeHtml(c.body || '')}</textarea>
        </div>
      </div>
    `;
    getContent = (m) => ({ body: m.querySelector('#lo-body').value.trim() });
  }

  else if (type === 'relatorio') {
    defaultTitle = 'Relatório médico';
    bodyHTML = `
      <div class="form-row">
        <div class="form-group">
          <label>Conteúdo do relatório</label>
          <textarea id="rel-body" style="min-height:280px;">${escapeHtml(c.body || '')}</textarea>
        </div>
      </div>
    `;
    getContent = (m) => ({ body: m.querySelector('#rel-body').value.trim() });
  }

  const titleInputHTML = `
    <div class="form-row">
      <div class="form-group">
        <label>Título do documento</label>
        <input id="doc-title" value="${escapeHtml(doc?.title || defaultTitle)}">
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group">
        <label>Data de emissão</label>
        <input type="date" id="doc-issue-date" value="${doc?.issue_date || new Date().toISOString().slice(0,10)}">
      </div>
    </div>
  `;

  openModal({
    title: isNew ? 'Novo: ' + defaultTitle : 'Editar: ' + defaultTitle,
    size: 'lg',
    bodyHTML: titleInputHTML + bodyHTML,
    footHTML: `
      <div style="flex:1"></div>
      <button class="btn-secondary" data-close>Cancelar</button>
      ${sigState.loaded ? `<button class="btn-primary" id="btn-sign-doc" style="background:var(--steel);color:#fff;">🔏 Salvar e assinar</button>` : ''}
      <button class="btn-primary" id="btn-save-doc">${isNew ? 'Salvar e gerar PDF' : 'Salvar'}</button>
    `,
    onMount: (m) => {
      // dynamic add buttons
      const addMed = m.querySelector('#btn-add-med');
      if (addMed) addMed.onclick = () => {
        const list = m.querySelector('#meds-list');
        const i = list.children.length;
        list.insertAdjacentHTML('beforeend', medEditorHTML({}, i));
        wireMedRemovers(m);
      };
      wireMedRemovers(m);

      const addExam = m.querySelector('#btn-add-exam');
      if (addExam) addExam.onclick = () => {
        const list = m.querySelector('#exams-list');
        const i = list.children.length;
        list.insertAdjacentHTML('beforeend', examEditorHTML({}, i));
        wireExamRemovers(m);
      };
      wireExamRemovers(m);

      // pacotes prontos + customizados
      const groupSel = m.querySelector('#ex-group-sel');
      const applyGroup = (replace) => {
        if (!groupSel) return;
        const idx = groupSel.value;
        if (idx === '') return;
        const grp = getAllExamGroups()[+idx];
        if (!grp) return;
        const list = m.querySelector('#exams-list');
        if (replace) list.innerHTML = '';
        else {
          if (list.children.length === 1) {
            const only = list.firstElementChild;
            const nameInput = only.querySelector('[data-f=name]');
            if (nameInput && !nameInput.value.trim()) list.innerHTML = '';
          }
        }
        grp.exams.forEach(e => {
          list.insertAdjacentHTML('beforeend', examEditorHTML(e, list.children.length));
        });
        wireExamRemovers(m);
        const ind = m.querySelector('#ex-indication');
        if (ind && !ind.value.trim()) ind.value = `Investigação de ${grp.name.toLowerCase()}.`;
      };
      // botões de pacote/grupos só existem no form de exames; ignora se ausentes
      const btnApply = m.querySelector('#btn-apply-group');
      if (btnApply) btnApply.onclick = () => applyGroup(false);
      const btnReplace = m.querySelector('#btn-replace-group');
      if (btnReplace) btnReplace.onclick = () => applyGroup(true);

      const btnSaveGroup = m.querySelector('#btn-save-group');
      if (btnSaveGroup) btnSaveGroup.onclick = async () => {
        const list = [];
        m.querySelectorAll('.exam-editor').forEach(ed => {
          const name = ed.querySelector('[data-f=name]').value.trim();
          const specs = ed.querySelector('[data-f=specs]').value.trim();
          if (name) list.push({ name, specs });
        });
        if (!list.length) { alert('Adicione ao menos um exame antes de salvar.'); return; }
        const name = prompt('Nome do pacote (ex: "Investigação de cefaleia da Dra. Maria"):');
        if (!name || !name.trim()) return;
        try {
          const { data, error } = await sb.from('emr_exam_groups').insert({
            name: name.trim(),
            exams: list,
            created_by: currentUser.id
          }).select().single();
          if (error) throw error;
          customExamGroups.push(data);
          customExamGroups.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
          rebuildGroupSelect(m);
          alert('Pacote salvo. Estará disponível em todas as próximas solicitações.');
        } catch (err) { alertErr(err); }
      };

      const btnManage = m.querySelector('#btn-manage-groups');
      if (btnManage) btnManage.onclick = () => openManageGroups(() => {
        rebuildGroupSelect(m);
      });

      // mostrar/ocultar bloco do acompanhante conforme tipo do atestado
      const subtypeSel = m.querySelector('#at-subtype');
      if (subtypeSel) {
        subtypeSel.onchange = () => {
          const row = m.querySelector('#at-companion-row');
          if (row) row.hidden = subtypeSel.value !== 'acompanhante';
        };
      }

      // Botão "Gerar laudo com IA" — só presente no form de laudo
      const laudoAiBtn = m.querySelector('#laudo-ai');
      if (laudoAiBtn) {
        laudoAiBtn.onclick = () => openLaudoAI(currentPatient, currentConsults, currentHistory, (txt) => {
          m.querySelector('#lo-body').value = txt;
        });
      }

      m.querySelector('#btn-save-doc').onclick = async (ev) => {
        ev?.preventDefault?.();
        console.log('[btn-save-doc] CLICK recebido — type=', type, 'isNew=', isNew);
        const btn = ev?.currentTarget || m.querySelector('#btn-save-doc');
        const origLabel = btn?.textContent;
        if (btn) { btn.disabled = true; btn.textContent = 'Gerando…'; }
        try {
          const payload = {
            patient_id: currentPatient.id,
            type,
            title: m.querySelector('#doc-title').value.trim() || defaultTitle,
            issue_date: m.querySelector('#doc-issue-date').value || new Date().toISOString().slice(0,10),
            content: getContent(m)
          };
          console.log('[btn-save-doc] payload OK', payload);

          // 1) gera PDF AGORA (no user-gesture do clique)
          try {
            console.log('[btn-save-doc] chamando generateDocPDF');
            generateDocPDF(payload);
            console.log('[btn-save-doc] generateDocPDF retornou OK');
          } catch (err) {
            console.error('[btn-save-doc] PDF gen falhou:', err);
            alert('Erro ao gerar PDF:\n\n' + (err?.message || err) + '\n\nVerifique o console (Cmd+Opt+J) para detalhes.');
            if (btn) { btn.disabled = false; btn.textContent = origLabel; }
            return;
          }

          // 2) persiste no Supabase
          try {
            if (isNew) {
              const { data, error } = await sb.from('emr_documents').insert(payload).select().single();
              if (error) throw error;
              currentDocs.unshift(data);
            } else {
              const { data, error } = await sb.from('emr_documents').update(payload).eq('id', doc.id).select().single();
              if (error) throw error;
              const idx = currentDocs.findIndex(x => x.id === doc.id);
              if (idx >= 0) currentDocs[idx] = data;
            }
            console.log('[btn-save-doc] Supabase OK');
            closeModal();
            renderDocs();
            renderSummary();
          } catch (err) {
            console.error('[btn-save-doc] Supabase falhou:', err);
            alert('PDF gerado, mas falhou ao salvar no banco:\n\n' + (err?.message || err));
            if (btn) { btn.disabled = false; btn.textContent = origLabel; }
          }
        } catch (outer) {
          console.error('[btn-save-doc] erro inesperado:', outer);
          alert('Erro inesperado:\n\n' + (outer?.message || outer));
          if (btn) { btn.disabled = false; btn.textContent = origLabel; }
        }
      };

      // Botão "Salvar e assinar" — salva no Supabase primeiro (obtém id), depois assina
      const signDocBtn = m.querySelector('#btn-sign-doc');
      if (signDocBtn) signDocBtn.onclick = async () => {
        signDocBtn.disabled = true; signDocBtn.textContent = 'Salvando…';
        try {
          const payload = {
            patient_id: currentPatient.id,
            type,
            title: m.querySelector('#doc-title').value.trim() || defaultTitle,
            issue_date: m.querySelector('#doc-issue-date').value || new Date().toISOString().slice(0,10),
            content: getContent(m),
          };
          let saved;
          if (isNew) {
            const { data, error } = await sb.from('emr_documents').insert(payload).select().single();
            if (error) throw error;
            saved = data;
            currentDocs.unshift(saved);
          } else {
            const { data, error } = await sb.from('emr_documents').update(payload).eq('id', doc.id).select().single();
            if (error) throw error;
            saved = data;
            const idx = currentDocs.findIndex(x => x.id === doc.id);
            if (idx >= 0) currentDocs[idx] = saved;
          }
          // Agora gera PDF com assinatura vinculada ao id salvo
          sigState.signingNow         = true;
          sigState.pendingSourceTable = 'emr_documents';
          sigState.pendingSourceId    = saved.id;
          generateDocPDF(saved);
          closeModal();
          renderDocs();
          renderSummary();
        } catch (err) {
          alertErr(err);
          signDocBtn.disabled = false; signDocBtn.textContent = '🔏 Salvar e assinar';
        }
      };
    }
  });
}
