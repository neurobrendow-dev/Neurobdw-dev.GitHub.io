function wireMedAutocomplete(editor) {
  if (editor.dataset.medAutocompleteWired === '1') return;
  editor.dataset.medAutocompleteWired = '1';
  const nameInput = editor.querySelector('[data-f=name]');
  const presInput = editor.querySelector('[data-f=concentration]');
  const posInput = editor.querySelector('[data-f=posology]');
  const presDl = editor.querySelector('datalist[data-role=presentations]');
  const posDl = editor.querySelector('datalist[data-role=posologies]');
  const hint = editor.querySelector('[data-f=hint]');
  const posHint = editor.querySelector('[data-f=posology-hint]');
  if (!nameInput || !presInput || !presDl) return;

  const updatePosologies = (med) => {
    if (!posDl) return;
    if (!med || !window.getMedicationPosologyOptions) {
      posDl.innerHTML = '';
      if (posHint) posHint.textContent = 'Escolha medicamento e apresentação para sugestões';
      return;
    }
    const options = window.getMedicationPosologyOptions(med, presInput.value);
    posDl.innerHTML = options
      .map(p => `<option value="${escapeHtml(p)}"></option>`).join('');
    if (posHint && window.getMedicationPosologyHint) {
      posHint.textContent = window.getMedicationPosologyHint(med, presInput.value);
    }
  };

  const update = () => {
    const med = findMedication(nameInput.value);
    if (med) {
      presDl.innerHTML = med.presentations
        .map(p => `<option value="${escapeHtml(p)}"></option>`).join('');
      if (hint) hint.textContent = `${med.presentations.length} apresentaç${med.presentations.length === 1 ? 'ão' : 'ões'} disponíveis`;
      updatePosologies(med);
      // se o input vier como "Marca (Princípio)", normaliza para o princípio ativo após sair do foco
    } else {
      presDl.innerHTML = '';
      if (hint) hint.textContent = 'Medicamento não encontrado na base — você pode digitar livremente';
      updatePosologies(null);
    }
  };
  nameInput.addEventListener('input', update);
  nameInput.addEventListener('change', () => {
    // normaliza "Marca (Princípio)" → "Princípio"
    const v = nameInput.value;
    const paren = v.match(/\(([^)]+)\)\s*$/);
    if (paren) nameInput.value = paren[1].trim();
    update();
  });
  presInput.addEventListener('input', () => updatePosologies(findMedication(nameInput.value)));
  presInput.addEventListener('change', () => updatePosologies(findMedication(nameInput.value)));
  if (posInput) posInput.addEventListener('focus', () => updatePosologies(findMedication(nameInput.value)));
  // disparo inicial caso já tenha valor
  if (nameInput.value) update();

  // checkbox "Uso contínuo"
  const usoCb  = editor.querySelector('[data-f=uso-continuo]');
  const qtyInp = editor.querySelector('[data-f=quantity]');
  if (usoCb && qtyInp) {
    const applyUsoContinuo = () => {
      if (usoCb.checked) {
        qtyInp.value    = 'uso contínuo';
        qtyInp.readOnly = true;
        qtyInp.style.background = '#f5f2ee';
      } else {
        if (qtyInp.value === 'uso contínuo') qtyInp.value = '';
        qtyInp.readOnly = false;
        qtyInp.style.background = '';
      }
    };
    usoCb.addEventListener('change', applyUsoContinuo);
    // se digitou "uso contínuo" manualmente, sincroniza o checkbox
    qtyInp.addEventListener('input', () => {
      const isUso = qtyInp.value.trim().toLowerCase() === 'uso contínuo';
      usoCb.checked = isUso;
      qtyInp.readOnly = isUso;
      qtyInp.style.background = isUso ? '#f5f2ee' : '';
    });
  }
}

function wireMedRemovers(m) {
  m.querySelectorAll('.med-editor').forEach(ed => wireMedAutocomplete(ed));
  m.querySelectorAll('.med-rm').forEach(b => {
    b.onclick = () => {
      const list = m.querySelector('#meds-list');
      if (list && list.children.length > 1) b.closest('.med-editor').remove();
      else alert('Mantenha ao menos 1 medicamento (ou exclua o documento).');
    };
  });
}

function rebuildGroupSelect(m) {
  const sel = m.querySelector('#ex-group-sel');
  if (!sel) return;
  const groups = getAllExamGroups();
  const builtinCount = (window.EXAM_GROUPS || []).length;
  let html = '<option value="">— escolher pacote —</option>';
  html += '<optgroup label="Pré-prontos">';
  groups.slice(0, builtinCount).forEach((g, i) => {
    html += `<option value="${i}">${escapeHtml(g.name)}</option>`;
  });
  html += '</optgroup>';
  if (groups.length > builtinCount) {
    html += '<optgroup label="Salvos por você">';
    groups.slice(builtinCount).forEach((g, i) => {
      html += `<option value="${builtinCount + i}">★ ${escapeHtml(g.name)}</option>`;
    });
    html += '</optgroup>';
  }
  sel.innerHTML = html;
}

function openManageGroups(onChange) {
  const render = () => customExamGroups.length
    ? customExamGroups.map(g => `
        <div class="doc-row" data-id="${g.id}" style="grid-template-columns:1fr auto auto;">
          <div>
            <strong>★ ${escapeHtml(g.name)}</strong>
            <div style="font-size:0.78rem;color:#7a8a9c;">${(g.exams || []).length} exame${(g.exams||[]).length===1?'':'s'}</div>
          </div>
          <button class="btn-ghost" data-act="rename">Renomear</button>
          <button class="btn-ghost" data-act="del" style="color:var(--danger)">Excluir</button>
        </div>`).join('')
    : '<div class="empty-state">Nenhum pacote salvo ainda.</div>';
  openModal({
    title:'Pacotes salvos',
    size:'md',
    bodyHTML:`<div id="mg-list">${render()}</div>`,
    footHTML:`<div style="flex:1"></div><button class="btn-secondary" data-close>Fechar</button>`,
    onMount:(m) => {
      const wire = () => {
        m.querySelectorAll('#mg-list .doc-row').forEach(row => {
          const id = row.dataset.id;
          const g = customExamGroups.find(x => x.id === id);
          row.querySelector('[data-act="rename"]').onclick = async () => {
            const name = prompt('Novo nome:', g.name);
            if (!name || !name.trim() || name.trim() === g.name) return;
            try {
              const { data, error } = await sb.from('emr_exam_groups')
                .update({ name: name.trim() }).eq('id', id).select().single();
              if (error) throw error;
              const idx = customExamGroups.findIndex(x => x.id === id);
              if (idx >= 0) customExamGroups[idx] = data;
              customExamGroups.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
              m.querySelector('#mg-list').innerHTML = render();
              wire();
              if (onChange) onChange();
            } catch (err) { alertErr(err); }
          };
          row.querySelector('[data-act="del"]').onclick = async () => {
            if (!confirm(`Excluir o pacote "${g.name}"?`)) return;
            try {
              const { error } = await sb.from('emr_exam_groups').delete().eq('id', id);
              if (error) throw error;
              customExamGroups = customExamGroups.filter(x => x.id !== id);
              m.querySelector('#mg-list').innerHTML = render();
              wire();
              if (onChange) onChange();
            } catch (err) { alertErr(err); }
          };
        });
      };
      wire();
    }
  });
}

/* ===========================================================
   ASSINATURA DIGITAL ICP-BRASIL
   Lei 14.063/2020 (assinatura eletrônica avançada) e CFM 2.299/2021.
   O certificado A1 (.p12/.pfx) fica APENAS na memória do navegador —
   nunca é enviado ao Supabase nem a qualquer servidor externo.
=========================================================== */
const sigState = {
  loaded: false,
  privateKey: null,   // forge.pki.PrivateKey
  cert: null,         // forge.pki.Certificate
  cn: '',
  issuer: '',
  serial: '',
  validUntil: null,
  // flags de assinatura explícita (setados pelo botão "Assinar")
  signingNow: false,
  pendingSourceTable: null,
  pendingSourceId: null,
  // assinatura silenciosa (sem download) — usada no "Assinar todos"
  silentMode: false,
  _resolve: null,   // resolvido ao final da assinatura em background
  // replay: reproduz carimbo de assinatura já registrada (PDF de doc já assinado)
  replayStamp: null, // { verifyId, cn, issuer, serial, signedAt }
};

function showToast(msg, isErr = false) {
  const old = document.getElementById('icp-toast');
  if (old) old.remove();
  const div = document.createElement('div');
  div.id = 'icp-toast';
  div.style.cssText = `
    position:fixed;bottom:90px;right:24px;z-index:9998;
    background:${isErr ? '#c44' : '#2d6a4f'};color:#fff;
    padding:12px 18px;font-size:0.88rem;max-width:380px;
    box-shadow:0 8px 24px rgba(0,0,0,0.25);font-family:'DM Sans',sans-serif;
  `;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => { try { div.remove(); } catch (_) {} }, 5000);
}

async function sha256hex(bytes) {
  const buf = await crypto.subtle.digest('SHA-256', bytes);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

function rsaSignBytes(bytes) {
  const md = forge.md.sha256.create();
  const buf = forge.util.createBuffer();
  for (let i = 0; i < bytes.length; i++) buf.putByte(bytes[i]);
  md.update(buf.bytes());
  const sig = sigState.privateKey.sign(md);
  return forge.util.encode64(sig);
}

function loadP12(arrayBuffer, password) {
  if (!window.forge) throw new Error('Biblioteca de criptografia (forge) não carregada.');
  const bytes = new Uint8Array(arrayBuffer);
  const buf = forge.util.createBuffer();
  for (let i = 0; i < bytes.length; i++) buf.putByte(bytes[i]);
  const asn1 = forge.asn1.fromDer(buf.bytes());
  const p12 = forge.pkcs12.pkcs12FromAsn1(asn1, password);

  let cert = null, privateKey = null;
  const certBags = p12.getBags({ bagType: forge.pki.oids.certBag });
  const keyBags  = p12.getBags({ bagType: forge.pki.oids.pkcs8ShroudedKeyBag });
  if (certBags[forge.pki.oids.certBag]?.length)
    cert = certBags[forge.pki.oids.certBag][0].cert;
  if (keyBags[forge.pki.oids.pkcs8ShroudedKeyBag]?.length)
    privateKey = keyBags[forge.pki.oids.pkcs8ShroudedKeyBag][0].key;
  if (!cert || !privateKey)
    throw new Error('Certificado ou chave privada não encontrados no arquivo P12.');

  const cnAttr  = cert.subject.getField('CN');
  const orgAttr = cert.issuer.getField('O');
  const cn      = cnAttr  ? cnAttr.value  : '(sem nome)';
  const issuer  = orgAttr ? orgAttr.value : (cert.issuer.getField('CN')?.value || '');
  const serial  = cert.serialNumber;
  const validUntil = cert.validity.notAfter;

  if (validUntil < new Date())
    throw new Error(`Certificado expirado em ${validUntil.toLocaleDateString('pt-BR')}.`);

  Object.assign(sigState, { loaded: true, cert, privateKey, cn, issuer, serial, validUntil });
}

/* Salva o certificado P12 (base64) + senha no localStorage para auto-carregar
   nas próximas sessões. A chave privada NUNCA é exportada — apenas o arquivo
   P12 original (que já é criptografado com a senha do usuário) é armazenado. */
function saveCertLocally(p12Bytes, password) {
  const b64 = btoa(String.fromCharCode(...new Uint8Array(p12Bytes)));
  localStorage.setItem('cert_p12_b64', b64);
  localStorage.setItem('cert_pwd',     password);
}

function clearCertLocally() {
  localStorage.removeItem('cert_p12_b64');
  localStorage.removeItem('cert_pwd');
}

/* Tenta auto-carregar o certificado salvo no localStorage. */
function autoLoadCert() {
  const b64 = localStorage.getItem('cert_p12_b64');
  const pwd  = localStorage.getItem('cert_pwd');
  if (!b64 || pwd === null) return;
  try {
    const binary = atob(b64);
    const bytes  = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    loadP12(bytes.buffer, pwd);
    updateCertIndicator();
    refreshGlobalPendingCount();
    console.info('[ICP] Certificado auto-carregado do localStorage.');
  } catch (err) {
    console.warn('[ICP] Falha ao auto-carregar certificado:', err.message);
    clearCertLocally();
  }
}

/* Desenha QR code diretamente no jsPDF como retângulos vetoriais.
   Evita canvas/addImage — funciona em qualquer contexto. */
function drawQRCodeInPDF(doc, text, x, y, size) {
  try {
    const qr = qrcode(0, 'M');
    qr.addData(text);
    qr.make();
    const n = qr.getModuleCount();
    const cell = size / n;
    doc.setFillColor(255, 255, 255);
    doc.rect(x, y, size, size, 'F');
    doc.setFillColor(13, 27, 42);
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (qr.isDark(r, c))
          doc.rect(x + c * cell, y + r * cell, cell, cell, 'F');
      }
    }
  } catch (_) {}
}

/* Limpa o CN do certificado ICP-Brasil: remove CPF e outros campos após ":". */
function cleanCN(cn) {
  return (cn || '').replace(/:\d[\d./-]*.*$/, '').trim();
}

function updateCertIndicator() {
  const btn = document.getElementById('btn-icp');
  if (!btn) return;
  if (!sigState.loaded) {
    btn.className = 'btn-icp';
    btn.title = 'Carregar certificado ICP-Brasil para assinar documentos';
    btn.textContent = '🔏 ICP-Brasil';
    return;
  }
  const daysLeft = Math.floor((sigState.validUntil - new Date()) / 86400000);
  btn.className = daysLeft < 30 ? 'btn-icp cert-exp' : 'btn-icp cert-ok';
  btn.title = `Signatário: ${sigState.cn}\nVálido até: ${sigState.validUntil.toLocaleDateString('pt-BR')}\nEmissor: ${sigState.issuer}`;
  btn.textContent = daysLeft < 30 ? `⚠ Cert. expirando` : `✓ Cert. ICP-Brasil`;
}

/* Carimbo ICP-Brasil no PDF.
   - Portrait: selo visual completo (badge + texto + QR code) entre CRM e info de página.
   - Landscape (receita especial): linha compacta no rodapé, pois o formulário é regulamentado. */
async function pdfICPStamp(doc, verifyId) {
  const pages = doc.internal.getNumberOfPages();

  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    const pgW = doc.internal.pageSize.getWidth();
    const pgH = doc.internal.pageSize.getHeight();
    const isLandscape = pgW > pgH;

    if (isLandscape) {
      // Landscape (receita especial): linha compacta no rodapé
      doc.setFontSize(6.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(90, 110, 130);
      doc.text(
        `Assinado digitalmente — ICP-Brasil — ${cleanCN(sigState.cn)} — ID: ${verifyId}`,
        pgW / 2, pgH - 3, { align: 'center' }
      );
      doc.setTextColor(13, 27, 42);
    } else {
      // Portrait: selo visual completo
      const M   = 18;
      const bX  = M;
      const bY  = 270;   // topo do carimbo (CRM em y=264, gap de 6mm)
      const sW  = pgW - 2 * M;  // 174mm
      const sH  = 17;   // altura do carimbo (termina em y=287, info em y=290)
      const bdW = 34;   // largura do badge ICP (esquerda)
      const qrS = sH - 1;   // tamanho do QR (quadrado, quase a altura toda)
      const qrX = bX + sW - qrS;  // QR alinhado à direita
      const txX = bX + bdW + 2.5; // início do texto
      const txW = sW - bdW - qrS - 5; // largura disponível para texto

      // Fundo do carimbo (azul claro)
      doc.setFillColor(236, 242, 252);
      doc.setDrawColor(170, 195, 220);
      doc.setLineWidth(0.25);
      doc.roundedRect(bX, bY, sW, sH, 1.5, 1.5, 'FD');

      // Badge navy (esquerda)
      doc.setFillColor(13, 27, 42);
      doc.roundedRect(bX, bY, bdW, sH, 1.5, 1.5, 'F');
      doc.rect(bX + bdW - 3, bY, 3, sH, 'F');

      // Texto do badge
      const bCx = bX + bdW / 2;
      doc.setFontSize(4.6);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(184, 154, 94);
      doc.text('ASSINATURA ELETRÔNICA', bCx, bY + 3.8, { align: 'center' });

      doc.setFontSize(6.8);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(255, 210, 70);
      doc.text('AVANÇADA', bCx, bY + 8, { align: 'center' });

      doc.setDrawColor(184, 154, 94);
      doc.setLineWidth(0.25);
      doc.line(bX + 3, bY + 9.8, bX + bdW - 3, bY + 9.8);

      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(255, 255, 255);
      doc.text('ICP', bX + 5.5, bY + 13.5);
      doc.setFontSize(6.5);
      doc.setFont('helvetica', 'normal');
      doc.text('Brasil', bX + 14, bY + 13.5);
      doc.setFontSize(8.5);
      doc.text('+', bX + 28, bY + 13.5);

      // Divisórias verticais
      doc.setDrawColor(150, 180, 210);
      doc.setLineWidth(0.2);
      doc.line(bX + bdW + 0.8, bY + 2, bX + bdW + 0.8, bY + sH - 2);
      doc.line(qrX - 2, bY + 2, qrX - 2, bY + sH - 2);

      // QR code aponta para a página de verificação com o ID único do documento
      drawQRCodeInPDF(doc, `https://neurobrendow.com.br/medico/verificar/?id=${verifyId}`, qrX, bY + 0.5, qrS - 1);

      // Texto descritivo — usa dados do replay ou dados atuais; limpa CPF do CN
      const replay = sigState.replayStamp;
      const stampCn = cleanCN(replay ? replay.cn : sigState.cn);
      const sigDate = new Date(replay ? replay.signedAt : Date.now()).toLocaleString('pt-BR', {
        timeZone: 'America/Fortaleza',
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6.0);
      doc.setTextColor(15, 35, 65);

      const descText = `Documento médico assinado digitalmente por ${stampCn.toUpperCase()} em ${sigDate}, conforme MP nº 2.200-2/2001, Resolução CFM 2.299/2021 e Lei 14.063/2020.`;
      const descLines = doc.splitTextToSize(descText, txW);
      let ty = bY + 4.5;
      const lh = 3.5;
      descLines.slice(0, 3).forEach(ln => { doc.text(ln, txX, ty); ty += lh; });

      doc.setFontSize(5.8);
      doc.setTextColor(40, 80, 150);
      doc.text('O documento poderá ser validado no QR Code ao lado:', txX, ty); ty += lh;
      doc.setTextColor(60, 90, 115);
      doc.text(`ID de verificação: ${verifyId}`, txX, ty);

      doc.setTextColor(13, 27, 42);
    }
  }
}

async function storeSigSupabase(verifyId, hashHex, sigB64, filename, meta) {
  try {
    const { error } = await sb.from('document_signatures').insert({
      id:               verifyId,
      doc_type:         meta.docType      || 'documento',
      doc_filename:     filename,
      doc_hash:         hashHex,
      signature_b64:    sigB64,
      cert_serial:      sigState.serial,
      cert_cn:          sigState.cn,
      cert_issuer:      sigState.issuer,
      cert_valid_until: sigState.validUntil?.toISOString() || null,
      patient_id:       meta.patientId    || currentPatient?.id || null,
      source_table:     meta.sourceTable  || null,
      source_id:        meta.sourceId     || null,
      created_by:       currentUser?.id   || null,
    });
    if (error) console.warn('[ICP] falha ao registrar assinatura:', error.message);
  } catch (err) {
    console.warn('[ICP] erro inesperado ao salvar assinatura:', err.message);
  }
}

/* pdfFooter: quando sigState.signingNow=true, sobe o rodapé 5mm para abrir espaço
   ao carimbo ICP visual (y=277–292) que pdfICPStamp desenhará logo abaixo do CRM. */
function pdfFooter(doc) {
  const W = 210, M = 18;
  const pages = doc.internal.getNumberOfPages();
  const signing = sigState.signingNow;
  // Quando assinando: sobe 14mm para abrir espaço ao carimbo (bY=270, sH=15 → y=270–285)
  const yLine = signing ? 254 : 268;
  const yName = signing ? 259 : 273;
  const yCRM  = signing ? 264 : 278;
  const yInfo = signing ? 290 : 290;
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setDrawColor(13, 27, 42);
    doc.setLineWidth(0.4);
    doc.line(W / 2 - 38, yLine, W / 2 + 38, yLine);
    doc.setFontSize(9);
    doc.setTextColor(13, 27, 42);

/* Sanitiza nome de arquivo (remove acentos e chars problemáticos para download). */
function safeFilename(s) {
  return (s || 'arquivo')
    .normalize('NFD').replace(/\p{Diacritic}/gu, '')
    .replace(/[^A-Za-z0-9._-]+/g, '-')
    .replace(/-+/g, '-').replace(/^-|-$/g, '')
    .toLowerCase()
    .slice(0, 120);
}

/* Gera e baixa o PDF. Quando sigState.signingNow=true (botão "Assinar" clicado),
   aplica o carimbo ICP-Brasil, assina criptograficamente e registra no Supabase.
   O download acontece imediatamente; a assinatura/registro ocorre em background. */
async function pdfSave(doc, filename) {
  // Captura e limpa flags de assinatura imediatamente (evita vazamento entre chamadas)
  const shouldSign     = sigState.signingNow;
  const silentMode     = sigState.silentMode;
  const replayStamp    = sigState.replayStamp;
  const sourceTable    = sigState.pendingSourceTable;
  const sourceId       = sigState.pendingSourceId;
  sigState.signingNow          = false;
  sigState.silentMode          = false;
  sigState.replayStamp         = null;
  sigState.pendingSourceTable  = null;
  sigState.pendingSourceId     = null;

  const fname = safeFilename(filename) || 'documento.pdf';

  let verifyId = null;
  if (shouldSign) {
    // Replay usa o verifyId original; nova assinatura gera um novo UUID
    verifyId = replayStamp ? replayStamp.verifyId : crypto.randomUUID();
    await pdfICPStamp(doc, verifyId);
  }

  let blob, blobUrl;
  try {
    blob = doc.output('blob');
    blobUrl = URL.createObjectURL(blob);
    console.log('[pdfSave] PDF gerado:', fname, blob.size, 'bytes');
  } catch (err) {
    console.error('[pdfSave] falha ao gerar blob:', err);
    alert('Erro ao gerar PDF: ' + err.message);
    return;
  }

  // Download — pulado no modo silencioso (assinatura em lote)
  if (!silentMode) {
    try { window.open(blobUrl, '_blank', 'noopener,noreferrer'); } catch (_) {}
    try {
      const a = document.createElement('a');
      a.href = blobUrl; a.download = fname; a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(() => { try { a.remove(); } catch (_) {} }, 500);
    } catch (_) {}
    showPdfBanner(blobUrl, fname);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 5 * 60 * 1000);
  }

  // Assinatura e registro em background (replay não grava novamente no Supabase)
  if (shouldSign && verifyId) {
    (async () => {
      try {
        if (!replayStamp) {
          const bytes   = new Uint8Array(await blob.arrayBuffer());
          const hashHex = await sha256hex(bytes);
          const sigB64  = rsaSignBytes(bytes);
          await storeSigSupabase(verifyId, hashHex, sigB64, fname, {
            sourceTable, sourceId,
            patientId: currentPatient?.id,
          });
        }
        if (sourceTable && sourceId) {
          await sb.from(sourceTable)
            .update({ is_signed: true, signed_at: new Date().toISOString() })
            .eq('id', sourceId);
          if (sourceTable === 'emr_documents') {
            const d = currentDocs.find(x => x.id === sourceId);
            if (d) { d.is_signed = true; d.signed_at = new Date().toISOString(); }
            if (!silentMode) { renderDocs(); renderPendingSignatures(); }
          } else if (sourceTable === 'emr_consultations') {
            const c = currentConsults.find(x => x.id === sourceId);
            if (c) { c.is_signed = true; c.signed_at = new Date().toISOString(); }
            if (!silentMode) { renderConsults(); renderPendingSignatures(); }
          }
        }
        refreshGlobalPendingCount();
        if (!silentMode) showToast(`Documento assinado — ICP-Brasil ✓`);
      } catch (err) {
        console.warn('[ICP] erro ao assinar:', err.message);
        if (!silentMode) showToast('PDF gerado, mas assinatura falhou: ' + err.message, true);
      } finally {
        // Sinaliza conclusão para o "Assinar todos" que aguarda em sequência
        if (sigState._resolve) { sigState._resolve(); sigState._resolve = null; }
        if (silentMode) URL.revokeObjectURL(blobUrl);
      }
    })();
  } else {
    // Sem assinatura: resolve imediatamente para não travar o lote
    if (sigState._resolve) { sigState._resolve(); sigState._resolve = null; }
  }
}

function pdfWrappedText(doc, text, x, y, maxW, lineH = 5) {
  if (!text) return y;
  doc.setFontSize(10);
  const lines = doc.splitTextToSize(text, maxW);
  for (const ln of lines) {
    if (y > 255) { doc.addPage(); y = 24; }
    doc.text(ln, x, y);
    y += lineH;
  }
  return y;
}

function getMedicationPrintGroups(content) {
  const meds = (content?.medications || []).filter(m => m && m.name);
  const items = meds.map((med, index) => ({ med, index }));
  if (!items.length) return [];
  if (content?.oneMedicationPerPage) return items.map(item => [item]);

  const groups = [];
  let current = [];
  items.forEach((item, pos) => {
    if (pos > 0 && item.med.pageBreakBefore && current.length) {
      groups.push(current);
      current = [];
    }
    current.push(item);
  });
  if (current.length) groups.push(current);
  return groups;
}

function contentForMedicationPrintGroup(content, group, includeInstructions) {
  return {
    ...content,
    medications: group.map(item => ({ ...item.med, _pdfIndex: item.index })),
    instructions: includeInstructions ? (content?.instructions || '') : ''
  };
}

function getExamPrintGroups(content) {
  const exams = (content?.exams || []).filter(e => e && e.name);
  const items = exams.map((exam, index) => ({ exam, index }));
  if (!items.length) return [];
  if (content?.oneExamPerPage) return items.map(item => [item]);

  const groups = [];
  let current = [];
  items.forEach((item) => {
    if (item.exam.pageBreakBefore) {
      if (current.length) {
        groups.push(current);
        current = [];
      }
      groups.push([item]);
      return;
    }
    current.push(item);
  });
  if (current.length) groups.push(current);
  return groups;
}

/* ===========================================================
   PDF — Receita ESPECIAL (Portaria 344/98)
   Layout: A4 paisagem, 2 vias lado a lado.
   Cada via segue o modelo oficial (boxes EMITENTE / CONTROLE
   ESPECIAL / COMPRADOR / FORNECEDOR).
=========================================================== */
function pdfReceitaEspecial(d) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });
  const W = 297, H = 210;
  const HALF = W / 2;
  const c = d.content || {};
  const groups = getMedicationPrintGroups(c);
  const printableGroups = groups.length ? groups : [[]];

  printableGroups.forEach((group, idx) => {
    if (idx > 0) doc.addPage();
    const pageContent = contentForMedicationPrintGroup(c, group, idx === printableGroups.length - 1);
    const pageNote = printableGroups.length > 1 ? `Folha ${idx + 1}/${printableGroups.length}` : '';

    drawReceitaEspecialVia(doc, 0, d, pageContent, pageNote);
    // linha tracejada divisória entre as vias
    doc.setDrawColor(160, 160, 160);
    doc.setLineWidth(0.2);
    doc.setLineDashPattern([1.2, 1.2], 0);
    doc.line(HALF, 8, HALF, H - 8);
    doc.setLineDashPattern([], 0);
    drawReceitaEspecialVia(doc, HALF, d, pageContent, pageNote);
  });

  const safe = currentPatient.full_name.replace(/\s+/g,'-').toLowerCase();
  pdfSave(doc, `receita-especial-${safe}-${d.issue_date}.pdf`);
}

function drawReceitaEspecialVia(doc, xOff, d, c, pageNote = '') {
  const PAGE_H = 210;
  const VW     = 148.5;            // largura da via
  const M      = 8;                // margem dentro da via
  const innerW = VW - 2 * M;       // largura útil (~132mm)
  const xLeft  = xOff + M;
  const cx     = xOff + VW / 2;    // centro da via
  const xRightLimit = xLeft + innerW;

  // utilitário de campo — 1 linha
  const drawField = (label, value, x, yi, labelW) => {
    doc.setFont('helvetica', 'bolditalic');
    doc.setTextColor(13, 27, 42);
    doc.text(label, x + 2, yi);
    doc.setFont('helvetica', 'italic');
    doc.setTextColor(60, 75, 95);
    doc.text(value || '', x + 2 + labelW, yi);
  };
  // utilitário de campo com wrap — retorna a altura consumida
  const drawFieldWrapped = (label, value, x, yi, labelW, maxValW) => {
    doc.setFont('helvetica', 'bolditalic');
    doc.setTextColor(13, 27, 42);
    doc.text(label, x + 2, yi);
    doc.setFont('helvetica', 'italic');
    doc.setTextColor(60, 75, 95);
    if (!value) return 5.5;
    const lines = doc.splitTextToSize(value, maxValW);
    lines.forEach((ln, li) => doc.text(ln, x + 2 + labelW, yi + li * 4.5));
    return lines.length === 1 ? 5.5 : 5.5 + (lines.length - 1) * 4.5;
  };

  // ----- 1) CABEÇALHO -----
  let y = 12;
  doc.setTextColor(13, 27, 42);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text('Dr. Brendow Mártin', cx, y, { align: 'center' });
  y += 5;
  doc.setFont('helvetica', 'italic');
  doc.setFontSize(10);
  doc.setTextColor(100, 110, 125);
  doc.text('Neurologista', cx, y, { align: 'center' });
  y += 1.5;
  doc.setDrawColor(184, 154, 94);
  doc.setLineWidth(0.5);
  doc.line(cx - 14, y, cx + 14, y);
  y += 4;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(120, 130, 145);
  doc.text(`CRM-CE ${DOCTOR_CRM_NUMBER}   ·    ${DOCTOR_RQE}`, cx, y, { align: 'center' });
  y += 5;

  // ----- 2) BOXES SUPERIORES (assinatura dentro do box CONTROLE) -----
  const boxLW = 80;
  const boxRW = innerW - boxLW - 3;
  const xR    = xLeft + boxLW + 3;

  // calcula quantas linhas o endereço vai precisar para definir a altura da caixa
  doc.setFontSize(8.5);
  const addrMaxW = boxLW - 2 - 18 - 2; // largura disponível após label "Endereço:"
  const addrText = docAddress() || '';
  const addrLineCount = addrText ? doc.splitTextToSize(addrText, addrMaxW).length : 1;
  const boxH = 50 + Math.max(0, (addrLineCount - 1) * 4.5); // altura dinâmica

  doc.setDrawColor(40, 50, 65);
  doc.setLineWidth(0.45);
  doc.rect(xLeft, y, boxLW, boxH);
  doc.rect(xR,    y, boxRW, boxH);

  // títulos
  doc.setFont('helvetica', 'bolditalic'); doc.setFontSize(9);
  doc.setTextColor(13, 27, 42);
  doc.text('IDENTIFICAÇÃO DO EMITENTE',     xLeft + boxLW / 2, y + 5, { align: 'center' });
  doc.text('CONTROLE ESPECIAL', xR    + boxRW / 2, y + 5, { align: 'center' });

  // campos do EMITENTE
  doc.setFontSize(8.5);
  let yy = y + 11;
  drawField('Nome:',        DOCTOR_LEGAL_NAME,                       xLeft, yy, 13); yy += 5.5;
  drawField('CRM:',         `${DOCTOR_CRM_NUMBER} ${DOCTOR_CRM_UF}`, xLeft, yy, 12); yy += 5.5;
  yy += drawFieldWrapped('Endereço:', addrText,                      xLeft, yy, 18, addrMaxW);
  drawField('Telefone:',    docPhone(),                              xLeft, yy, 16); yy += 5.5;
  drawField('Cidade e UF:', docCity(),                               xLeft, yy, 22);

  // campos do CONTROLE ESPECIAL: data + via1/via2 + linha de assinatura DENTRO
  yy = y + 11;
  doc.setFont('helvetica','bolditalic'); doc.setFontSize(8.5);
  doc.setTextColor(13, 27, 42);
  doc.text('DATA:', xR + 2, yy);
  doc.setFont('helvetica','italic');
  doc.setTextColor(60, 75, 95);
  doc.text(fmtDate(d.issue_date), xR + 2 + 11, yy);
  yy += 6.5;
  doc.text('1ª via — farmácia', xR + 2, yy); yy += 5;
  doc.text('2ª via — paciente', xR + 2, yy);

  // linha de assinatura dentro do box (espaço para carimbo)
  const sigY = y + boxH - 8;
  doc.setDrawColor(40, 50, 65);
  doc.setLineWidth(0.4);
  doc.line(xR + 4, sigY, xR + boxRW - 4, sigY);
  doc.setFont('helvetica', 'bolditalic'); doc.setFontSize(8);
  doc.setTextColor(13, 27, 42);
  doc.text('ASSINATURA E CARIMBO', xR + boxRW / 2, sigY + 4, { align: 'center' });

  // ----- 3) BLOCO DO PACIENTE -----
  let yp = y + boxH + 5;
  doc.setFontSize(9);
  drawField('Paciente:', currentPatient.full_name || '', xLeft, yp, 17); yp += 5;
  drawField('CPF:',      currentPatient.cpf       || '', xLeft, yp, 9);  yp += 5;
  drawField('Endereço:', currentPatient.address   || '', xLeft, yp, 17);
  if (pageNote) {
    yp += 5;
    drawField('Folha:', pageNote, xLeft, yp, 11);
  }

  // ----- 4) PRESCRIÇÕES -----
  let yMed = yp + 9;
  doc.setTextColor(13, 27, 42);

  (c.medications || []).forEach((m) => {
    if (yMed > PAGE_H - 55) return;
    const nameStr = `${m.name || ''}${m.concentration ? ', ' + m.concentration : ''}`;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
    doc.text(nameStr, xLeft, yMed);
    const nameW = doc.getTextWidth(nameStr);

    // Mostra a quantidade (ou "uso contínuo") alinhada à direita — só se preenchida
    const qtyStr = m.quantity || '';
    if (qtyStr) {
      doc.setFont('helvetica', 'italic'); doc.setFontSize(9.5);
      const qtyW = doc.getTextWidth(qtyStr);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
      doc.setTextColor(120, 130, 145);
      let xd = xLeft + nameW + 2;
      const xdEnd = xRightLimit - qtyW - 1.5;
      while (xd < xdEnd) { doc.text('.', xd, yMed); xd += 1.3; }
      doc.setTextColor(13, 27, 42);
      doc.setFont('helvetica', 'italic'); doc.setFontSize(9.5);
      doc.text(qtyStr, xRightLimit - qtyW, yMed);
    }
    yMed += 5;

    if (m.posology) {
      doc.setFont('helvetica', 'italic'); doc.setFontSize(10);
      const lines = doc.splitTextToSize(m.posology, innerW);
      lines.forEach(ln => { doc.text(ln, xLeft, yMed); yMed += 4.5; });
    }
    yMed += 3;
  });

  if (c.instructions) {
    if (yMed < PAGE_H - 60) {
      yMed += 2;
      doc.setFont('helvetica','bold'); doc.setFontSize(9);
      doc.text('Orientações:', xLeft, yMed); yMed += 4;
      doc.setFont('helvetica','italic'); doc.setFontSize(9.5);
      const lines = doc.splitTextToSize(c.instructions, innerW);
      for (const ln of lines) {
        if (yMed > PAGE_H - 55) break;
        doc.text(ln, xLeft, yMed); yMed += 4.3;
      }
    }
  }

  // ----- 5) BOXES INFERIORES (Comprador + Fornecedor) — mais altos -----
  const compH = 42;
  const bottomY = PAGE_H - compH - 11;
  const compW = (innerW - 4) / 2;
  doc.setDrawColor(40, 50, 65);
  doc.setLineWidth(0.45);
  doc.rect(xLeft,             bottomY, compW, compH);
  doc.rect(xLeft + compW + 4, bottomY, compW, compH);

  doc.setFont('helvetica','bolditalic'); doc.setFontSize(9);
  doc.setTextColor(13, 27, 42);
  doc.text('IDENTIFICAÇÃO DO COMPRADOR',  xLeft + compW / 2,             bottomY + 5, { align: 'center' });
  doc.text('IDENTIFICAÇÃO DO FORNECEDOR', xLeft + compW + 4 + compW / 2, bottomY + 5, { align: 'center' });

  // Comprador — labels
  doc.setFont('helvetica','bolditalic'); doc.setFontSize(8);
  let yc = bottomY + 11;
  ['Nome:', 'RG:', 'Endereço:', 'Telefone:', 'Cidade e UF:'].forEach(lbl => {
    doc.text(lbl, xLeft + 2, yc);
    yc += 6;       // espaço maior pra preencher
  });

  // Fornecedor — DATA + linha; ASSINATURA + linha (com folga)
  const xF = xLeft + compW + 4;
  doc.setFont('helvetica','bolditalic'); doc.setFontSize(8.5);
  doc.text('DATA:', xF + 3, bottomY + 13);
  doc.setLineWidth(0.4);
  doc.line(xF + 14, bottomY + 13, xF + compW - 4, bottomY + 13);

  // linha de assinatura do farmacêutico no rodapé do box
  const fSigY = bottomY + compH - 9;
  doc.line(xF + 4, fSigY, xF + compW - 4, fSigY);
  doc.setFont('helvetica','bolditalic'); doc.setFontSize(8);
  doc.text('ASSINATURA DO FARMACÊUTICO', xF + compW / 2, fSigY + 4, { align: 'center' });

  doc.setTextColor(13, 27, 42);
}

function pdfReceita(d, label, isSpecial) {

    y = pdfHeader(doc, headerLabel);
    y = pdfPatientBlock(doc, y, currentPatient);

    if (isSpecial) drawSpecialBanner();

    const newPage = () => {
      doc.addPage();
      y = pdfHeader(doc, headerLabel);
      y = pdfPatientBlock(doc, y, currentPatient);
      if (isSpecial) drawSpecialBanner();
    };

    const writeWrapped = (text, x, maxW, lineH = 5) => {
      if (!text) return;
      const lines = doc.splitTextToSize(text, maxW);
      for (const ln of lines) {
        if (y > 255) newPage();
        doc.text(ln, x, y);
        y += lineH;
      }
    };

    group.forEach(({ med: m, index }) => {
      if (y > 245) newPage();
      doc.setFont('helvetica','bold'); doc.setFontSize(11);
      const head = `${index + 1}) ${m.name || ''}${m.concentration ? '  ·  ' + m.concentration : ''}`;
      doc.text(head, M, y); y += 6;
      doc.setFont('helvetica','normal'); doc.setFontSize(10);
      if (m.posology) writeWrapped('   ' + m.posology, M, W - 2*M);
      if (m.quantity) {
        doc.setFont('helvetica','italic');
        doc.text(`   Quantidade: ${m.quantity}`, M, y); y += 5;
        doc.setFont('helvetica','normal');
      }
      y += 2;
    });

    if (c.instructions && groupIndex === totalGroups - 1) {
      if (y > 245) newPage();
      doc.setFont('helvetica','bold'); doc.setFontSize(10);
      doc.text('Orientações', M, y); y += 4;
      doc.setDrawColor(184,154,94); doc.line(M, y, M + 30, y); y += 4;
      doc.setFont('helvetica','normal');
      writeWrapped(c.instructions, M, W - 2*M);
    }
  };

  let printedAny = false;
  const renderGroupPage = (viaLabel, group, groupIndex, totalGroups) => {
    if (printedAny) doc.addPage();
    printedAny = true;
    renderOne(viaLabel, group, groupIndex, totalGroups);
  };

  printableGroups.forEach((group, idx) => {
    renderGroupPage(isSpecial ? '1ª via (paciente)' : '', group, idx, printableGroups.length);
  });
  if (isSpecial) {
    printableGroups.forEach((group, idx) => {
      renderGroupPage('2ª via (farmácia)', group, idx, printableGroups.length);
    });
  }

  pdfFooter(doc);
  const safe = currentPatient.full_name.replace(/\s+/g,'-').toLowerCase();
  pdfSave(doc, `receita-${safe}-${d.issue_date}.pdf`);
}

function pdfExames(d, label) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const M = 18, W = 210;
  const c = d.content || {};

  printableGroups.forEach((group, groupIndex) => {

    const headerLabel = label + pageNote;
    let y = pdfHeader(doc, headerLabel);
    y = pdfPatientBlock(doc, y, currentPatient);

    const newPage = () => {
      doc.addPage();
      y = pdfHeader(doc, headerLabel);
      y = pdfPatientBlock(doc, y, currentPatient);
    };

    const writeWrapped = (text, x, maxW, lineH = 5) => {
      if (!text) return;
      const lines = doc.splitTextToSize(text, maxW);
      for (const ln of lines) {
        if (y > 255) newPage();
        doc.text(ln, x, y);
        y += lineH;
      }
    };

    doc.setFont('helvetica','bold'); doc.setFontSize(11);
    doc.text('Solicito', M, y); y += 6;

      if (y > 255) newPage();
      doc.setFont('helvetica','bold'); doc.setFontSize(10);

    }
  });

  pdfFooter(doc);
  const safe = currentPatient.full_name.replace(/\s+/g,'-').toLowerCase();
  pdfSave(doc, `exames-${safe}-${d.issue_date}.pdf`);
}

function pdfAtestado(d, label) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const M = 18, W = 210;
  const c = d.content || {};

  let y = pdfHeader(doc, label);
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text('ATESTADO', W/2, y, { align: 'center' });
  y += 12;

  const p = currentPatient;
  doc.setFont('helvetica','normal'); doc.setFontSize(11);

  let body = '';
  if (c.subtype === 'afastamento') {
    const dias = c.days || 0;
    body = `Atesto, para os devidos fins, que o(a) Sr(a). ${p.full_name}` +
      (p.cpf ? `, portador(a) do CPF ${p.cpf}` : '') +
      `, foi atendido(a) em ${fmtDate(d.issue_date)} e necessita de afastamento de suas atividades laborais/escolares por ${dias} (${numberToWords(dias)}) dia${dias === 1 ? '' : 's'} a partir desta data.`;
  } else if (c.subtype === 'comparecimento') {
    body = `Atesto que o(a) Sr(a). ${p.full_name}${p.cpf ? `, CPF ${p.cpf}` : ''} compareceu a esta consulta médica em ${fmtDate(d.issue_date)}, das ___h às ___h, para fins de comprovação.`;
  } else if (c.subtype === 'acompanhante') {
    const ac = (c.companion_name || '').trim();
    const rel = (c.companion_relation || '').trim();
    body = `Atesto que o(a) Sr(a). ${ac || '___________________________________'}` +
      (rel ? `, ${rel} do(a) paciente ${p.full_name}` : `, acompanhante do(a) paciente ${p.full_name}`) +
      (p.cpf ? ` (CPF ${p.cpf})` : '') +
      `, compareceu a esta consulta médica em ${fmtDate(d.issue_date)}, das ___h às ___h, sendo necessária a sua presença.`;
  } else if (c.subtype === 'aptidao') {
    body = `Atesto, para os devidos fins, que o(a) Sr(a). ${p.full_name}${p.cpf ? `, CPF ${p.cpf}` : ''}, após avaliação clínica nesta data (${fmtDate(d.issue_date)}), encontra-se apto(a) para suas atividades habituais, salvo intercorrências.`;
  }
  if (c.free_text) body = (body ? body + ' ' : '') + c.free_text;
  y = pdfWrappedText(doc, body, M, y, W - 2*M, 7); y += 4;

  if (c.cid && c.include_cid) {
    doc.setFont('helvetica','italic');
    doc.text(`CID-10: ${c.cid}`, M, y); y += 7;
  }

  pdfFooter(doc);
  const safe = currentPatient.full_name.replace(/\s+/g,'-').toLowerCase();
  pdfSave(doc, `atestado-${safe}-${d.issue_date}.pdf`);
}

/* ===========================================================
   PDF — Prontuário Completo
   Gera um único PDF com histórico médico, todas as consultas
   e todos os documentos emitidos para o paciente atual.
=========================================================== */
async function pdfProntuarioCompleto() {
  const p = currentPatient;
  if (!p) return;

  const btn = document.getElementById('btn-print-prontuario');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Gerando…'; }

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const M = 18, W = 210;
    const TYPES_CONSULT = { primeira:'Primeira consulta', retorno:'Retorno', urgencia:'Urgência', teleconsulta:'Teleconsulta' };
    const TYPES_DOC = { receita_simples:'Receita simples', receita_especial:'Receita especial (controlado)', exames:'Solicitação de exames', atestado:'Atestado médico', laudo:'Laudo médico', relatorio:'Relatório médico' };

    let firstPage = true;

    const newSection = (title) => {
      if (!firstPage) doc.addPage();
      firstPage = false;
      pdfHeader(doc, 'Prontuário Completo');
      let y = 42;
      // Faixa de seção
      doc.setFillColor(30, 50, 80);
      doc.rect(M, y, W - 2*M, 8, 'F');
      doc.setTextColor(212, 185, 122);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.text(title.toUpperCase(), M + 4, y + 5.5);
      doc.setTextColor(13, 27, 42);
      return y + 14;
    };

    const addText = (doc, text, x, yRef, maxW, fontSize = 10, lineH = 5, style = 'normal') => {
      if (!text) return yRef;
      doc.setFont('helvetica', style);
      doc.setFontSize(fontSize);
      const lines = doc.splitTextToSize(String(text), maxW);
      for (const ln of lines) {
        if (yRef > 252) {
          doc.addPage();
          pdfHeader(doc, 'Prontuário Completo');
          yRef = 48;
        }
        doc.text(ln, x, yRef);
        yRef += lineH;
      }
      return yRef;
    };

    const sectionLine = (doc, y) => {
      doc.setDrawColor(216, 228, 240);
      doc.setLineWidth(0.25);
      doc.line(M, y, W - M, y);
      return y + 4;
    };

    // ── 1. IDENTIFICAÇÃO DO PACIENTE ──────────────────────────
    let y = newSection('Identificação do Paciente');
    doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
    doc.setTextColor(13, 27, 42);
    doc.text(p.full_name || '—', M, y); y += 7;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5);
    doc.setTextColor(60, 80, 110);
    const idMeta = [
      p.birth_date ? `Nasc.: ${fmtDate(p.birth_date)} (${age(p.birth_date)} anos)` : null,
      p.sex ? ({ F:'Sexo: Feminino', M:'Sexo: Masculino', O:'Sexo: Outro' }[p.sex] || null) : null,
      p.cpf ? `CPF: ${p.cpf}` : null,
      p.rg  ? `RG: ${p.rg}`   : null,
      p.phone ? `Tel.: ${p.phone}` : null,
      p.health_plan ? `Convênio: ${p.health_plan}` : null,
    ].filter(Boolean);
    idMeta.forEach(m => { doc.text(m, M, y); y += 5; });
    if (p.address) { doc.text(`End.: ${p.address}`, M, y); y += 5; }
    y += 2;

    // ── 2. HISTÓRICO MÉDICO ───────────────────────────────────
    const h = currentHistory;
    if (h && (h.comorbidities || h.allergies || h.family_history || h.personal_history || h.medications || h.vaccinations || h.notes)) {
      y = sectionLine(doc, y);
      doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(30, 50, 80);
      doc.text('HISTÓRICO MÉDICO', M, y); y += 6;
      doc.setTextColor(13, 27, 42);
      const hFields = [
        ['Comorbidades', h.comorbidities],
        ['Alergias', h.allergies],
        ['Antecedentes familiares', h.family_history],
        ['Antecedentes pessoais', h.personal_history],
        ['Medicações em uso', h.medications],
        ['Vacinação', h.vaccinations],
        ['Observações', h.notes],
      ];
      for (const [label, val] of hFields) {
        if (!val) continue;
        if (y > 248) { doc.addPage(); pdfHeader(doc, 'Prontuário Completo'); y = 48; }
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
        doc.text(label + ':', M, y); y += 4.5;
        y = addText(doc, val, M, y, W - 2*M, 9, 4.5);
        y += 2;
      }
    }

    // ── 3. CONSULTAS ─────────────────────────────────────────
    const consults = [...currentConsults].sort((a, b) =>
      (a.consultation_date || '').localeCompare(b.consultation_date || ''));

    if (consults.length) {
      y = newSection(`Consultas (${consults.length})`);
      for (const c of consults) {
        if (y > 240) { doc.addPage(); pdfHeader(doc, 'Prontuário Completo'); y = 48; }
        // Cabeçalho da consulta
        doc.setFillColor(240, 244, 252);
        doc.rect(M, y - 1, W - 2*M, 8, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(13, 27, 42);
        doc.text(`${fmtDateTime(c.consultation_date)}  ·  ${TYPES_CONSULT[c.type] || c.type}`, M + 2, y + 5);
        if (c.is_signed) {
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(30, 110, 70);
          doc.text('✓ assinado', W - M - 2, y + 5, { align: 'right' });
        }
        y += 11; doc.setTextColor(13, 27, 42);

        const cFields = [
          ['Queixa principal', c.chief_complaint],
          ['História da doença', c.hda],
          ['Exame físico', c.physical_exam],
          ['Exame neurológico', c.neuro_exam],
          ['Hipótese diagnóstica', c.hypothesis],
          ['CID-10', (c.cid_codes || []).join(', ')],
          ['Conduta', c.plan],
          ['Retorno', c.return_in],
          ['Observações', c.notes],
        ];
        for (const [label, val] of cFields) {
          if (!val) continue;
          if (y > 248) { doc.addPage(); pdfHeader(doc, 'Prontuário Completo'); y = 48; }
          doc.setFont('helvetica', 'bold'); doc.setFontSize(8.5); doc.setTextColor(50, 70, 100);
          doc.text(label + ':', M, y); y += 4;
          y = addText(doc, val, M, y, W - 2*M, 9, 4.5);
          y += 1;
        }
        y = sectionLine(doc, y + 2);
      }
    }

    // ── 4. DOCUMENTOS ────────────────────────────────────────
    const docs = [...currentDocs].sort((a, b) =>
      (a.issue_date || '').localeCompare(b.issue_date || ''));

    if (docs.length) {
      y = newSection(`Documentos Emitidos (${docs.length})`);
      for (const d of docs) {
        if (y > 240) { doc.addPage(); pdfHeader(doc, 'Prontuário Completo'); y = 48; }
        doc.setFillColor(240, 244, 252);
        doc.rect(M, y - 1, W - 2*M, 8, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9.5); doc.setTextColor(13, 27, 42);
        const docLabel = `${fmtDate(d.issue_date)}  ·  ${TYPES_DOC[d.type] || d.type}`;
        doc.text(docLabel, M + 2, y + 5);
        if (d.title) {
          doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
          const titleTxt = d.title.length > 50 ? d.title.slice(0, 50) + '…' : d.title;
          doc.text(titleTxt, W - M - 2, y + 5, { align: 'right' });
        }
        if (d.is_signed) {
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(30, 110, 70);
          // Já impresso no title spot; add a small marker
        }
        y += 11; doc.setTextColor(13, 27, 42);

        // Conteúdo resumido por tipo
        const c = d.content || {};
        if (d.type === 'receita_simples' || d.type === 'receita_especial') {
          (c.medications || []).forEach((m, i) => {
            if (!m.name) return;
            if (y > 248) { doc.addPage(); pdfHeader(doc, 'Prontuário Completo'); y = 48; }
            doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
            doc.text(`${i+1}) ${m.name}${m.concentration ? ' · ' + m.concentration : ''}`, M, y); y += 4.5;
            if (m.posology) y = addText(doc, '   ' + m.posology, M, y, W - 2*M, 9, 4.2);
            if (m.quantity) { doc.setFont('helvetica','italic'); doc.setFontSize(8.5); doc.text(`   Qtd.: ${m.quantity}`, M, y); y += 4; doc.setFont('helvetica','normal'); }
            y += 1;
          });
          if (c.instructions) y = addText(doc, 'Orientações: ' + c.instructions, M, y, W - 2*M, 9, 4.5);
        } else if (d.type === 'exames') {
          (c.exams || []).forEach((e, i) => {
            if (!e.name) return;
            if (y > 250) { doc.addPage(); pdfHeader(doc, 'Prontuário Completo'); y = 48; }
            doc.setFont('helvetica','normal'); doc.setFontSize(9);
            doc.text(`${i+1}) ${e.name}${e.specs ? ' — ' + e.specs : ''}`, M, y); y += 4.5;
          });
          if (c.indication) y = addText(doc, 'Indicação: ' + c.indication, M, y, W - 2*M, 9, 4.5);
        } else {
          const bodyField = c.body || c.text || c.reason || '';
          if (bodyField) y = addText(doc, bodyField, M, y, W - 2*M, 9, 4.5);
        }
        y = sectionLine(doc, y + 2);
      }
    }

    // ── Rodapé final ─────────────────────────────────────────
    pdfFooter(doc);

    const safe = p.full_name.replace(/\s+/g, '-').toLowerCase();
    const today = new Date().toISOString().slice(0, 10);
    pdfSave(doc, `prontuario-completo-${safe}-${today}.pdf`);

  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📋 Prontuário completo'; }
  }
}

/* ===========================================================
   IA — organizar texto da consulta
   A chave da API fica APENAS no localStorage do navegador. Nunca
   é enviada ao Supabase. Suporta Anthropic Claude e OpenAI.
=========================================================== */
const AI_DEFAULTS = {
  anthropic: { model: 'claude-sonnet-4-6' },
  openai:    { model: 'gpt-4o' }
};

/* Modelos disponíveis em cada provedor (nome técnico + label amigável). */
const AI_MODELS = {
  anthropic: [
    { id: 'claude-haiku-4-5-20251001', label: 'Claude Haiku 4.5 — rápido e barato' },
    { id: 'claude-sonnet-4-6',         label: 'Claude Sonnet 4.6 — equilíbrio (recomendado)' },
    { id: 'claude-opus-4-7',           label: 'Claude Opus 4.7 — mais inteligente, mais caro' },
  ],
  openai: [
    { id: 'gpt-4o-mini',  label: 'GPT-4o mini — rápido e muito barato' },
    { id: 'gpt-4o',       label: 'GPT-4o — equilíbrio (recomendado)' },
    { id: 'gpt-4-turbo',  label: 'GPT-4 Turbo — versão anterior' },
    { id: 'o1-mini',      label: 'o1-mini — raciocínio reduzido' },
    { id: 'o1',           label: 'o1 — raciocínio profundo, mais caro' },
  ]
};

function getAIConfig() {
  return {
    provider: localStorage.getItem('ai_provider') || 'anthropic',
    apiKey:   localStorage.getItem('ai_api_key')  || '',
    model:    localStorage.getItem('ai_model')    || ''
  };
}
function setAIConfig({ provider, apiKey, model }) {
  localStorage.setItem('ai_provider', provider);
  localStorage.setItem('ai_api_key',  apiKey);
  localStorage.setItem('ai_model',    model || AI_DEFAULTS[provider].model);
}

function openAIConfig() {
  const cfg = getAIConfig();

  const renderModelOptions = (provider, currentModel) => {
    const list = AI_MODELS[provider] || [];
    const ids = list.map(m => m.id);
    const isCustom = currentModel && !ids.includes(currentModel);
    let html = list.map(m =>
      `<option value="${escapeHtml(m.id)}" ${m.id === currentModel ? 'selected' : ''}>${escapeHtml(m.label)}</option>`
    ).join('');
    html += `<option value="__custom__" ${isCustom ? 'selected' : ''}>Outro (digitar nome)…</option>`;
    return html;
  };

  openModal({
    title:'Configuração da IA',
    size:'md',
    bodyHTML:`
      <p style="font-size:0.86rem;color:#5a6f85;margin-bottom:14px;">
        A chave fica salva <strong>apenas neste navegador</strong> (localStorage). Nunca é enviada ao
        servidor do prontuário. A IA é chamada diretamente da sua máquina para o provedor.
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>Provedor</label>
          <select id="ai-provider">
            <option value="anthropic" ${cfg.provider==='anthropic'?'selected':''}>Anthropic (Claude)</option>
            <option value="openai" ${cfg.provider==='openai'?'selected':''}>OpenAI (ChatGPT)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Modelo</label>
          <select id="ai-model-select">
            ${renderModelOptions(cfg.provider || 'anthropic', cfg.model || AI_DEFAULTS[cfg.provider || 'anthropic'].model)}
          </select>
          <input id="ai-model-custom" placeholder="ex: gpt-5, claude-x-y..." value="${escapeHtml(cfg.model || '')}" style="margin-top:8px;display:none;">
          <span class="form-hint">Mude o modelo a qualquer momento — sem reiniciar.</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>API key</label>
          <input id="ai-key" type="password" autocomplete="off" value="${escapeHtml(cfg.apiKey)}" placeholder="sk-... ou sk-ant-...">
        </div>
      </div>
      <div class="msg info" style="font-size:0.82rem;">
        Onde obter: <a href="https://console.anthropic.com/" target="_blank" rel="noopener">console.anthropic.com</a>

        Modelos "mini"/"haiku" custam centavos por consulta.
      </div>
    `,

      <button class="btn-secondary" data-close>Cancelar</button>
      <button class="btn-primary" id="ai-save">Salvar</button>
    `,

      const modelSel  = m.querySelector('#ai-model-select');
      const modelCust = m.querySelector('#ai-model-custom');

      const syncCustomVisibility = () => {
        modelCust.style.display = modelSel.value === '__custom__' ? '' : 'none';
      };
      syncCustomVisibility();

      // troca o provedor → atualiza lista de modelos com o default daquele provedor
      provSel.onchange = () => {
        const def = AI_DEFAULTS[provSel.value].model;
        modelSel.innerHTML = renderModelOptions(provSel.value, def);
        modelCust.value = '';
        syncCustomVisibility();
      };
      modelSel.onchange = syncCustomVisibility;

      m.querySelector('#ai-save').onclick = () => {
        const provider = provSel.value;
        const apiKey = m.querySelector('#ai-key').value.trim();
        let model = modelSel.value;
        if (model === '__custom__') {
          model = modelCust.value.trim();
          if (!model) { alert('Digite o nome do modelo personalizado.'); return; }
        }
        if (!apiKey) { alert('Cole a API key.'); return; }
        setAIConfig({ provider, apiKey, model });
        closeModal();
      };
      m.querySelector('#ai-clear').onclick = () => {
        if (!confirm('Remover a chave e configurações salvas neste navegador?')) return;
        localStorage.removeItem('ai_provider');
        localStorage.removeItem('ai_api_key');
        localStorage.removeItem('ai_model');
        closeModal();
      };
    }
  });
}

  physical_exam: `Reescreva como exame físico geral em prontuário, organizado por sistemas, na ordem clássica: estado geral → aparelho cardiovascular (AC) → aparelho respiratório (AR) → abdome → extremidades. Use terminologia padrão (BNRNF 2T, MV+ bilateral sem RA, RHA+, edema +/4+, pulsos cheios e simétricos). Mantenha todos os achados anormais explícitos com lateralidade.`,

  hypothesis: `Organize as hipóteses diagnósticas em lista enumerada (1., 2., 3.), da mais provável à menos provável. Para cada uma, inclua o CID-10 entre parênteses se mencionado. Adicione justificativa apenas se já presente no texto original.`,

  plan: `Organize a conduta em itens claros, na seguinte ordem quando aplicável: (1) Medicações — nome, apresentação, dose, via, posologia e duração; (2) Exames complementares solicitados; (3) Orientações ao paciente (medidas comportamentais, sinais de alarme); (4) Encaminhamentos / interconsultas; (5) Retorno em [tempo]. NÃO inclua nenhuma medicação, dose, exame ou orientação que não esteja explícita no texto original.`,

  notes: `Reescreva as observações em prontuário formal, em parágrafos claros. Preserve TODA a informação original — não simplifique nem reduza.`
};

async function organizeWithAI(currentText, fieldName, onApply) {

  // mostra modal de loading + diff
  openModal({
    title:'Organizando com IA…',
    size:'lg',
    bodyHTML:`
      <div class="form-row">
        <div class="form-group">

const AI_SYSTEM_PROMPT = `Você é um médico-assistente experiente em redação de prontuário neurológico em português do Brasil. Sua função é receber anotações ABREVIADAS, RÁPIDAS, INCOMPLETAS ditadas pelo neurologista durante a consulta e devolver O MESMO CONTEÚDO CLÍNICO reescrito de forma TÉCNICA, COMPLETA E ORGANIZADA, como apareceria num prontuário formal de hospital universitário.

EXEMPLO DO PADRÃO ESPERADO

Entrada (HDA, anotações rápidas):
"pcte fem 52a, cefaleia há 6m, holocraniana, latejante, 7-8/10, 2-3x/sem, ja tentou amitripti sem resp, foto fonofobia, naúsea, sem aura, piora c/ stress, sem rdcat"

Saída (HDA formal):
"Paciente do sexo feminino, 52 anos, refere quadro de cefaleia com início há 6 meses, de característica holocraniana, pulsátil, intensidade 7–8/10 pela escala visual analógica, com frequência de 2 a 3 episódios semanais. Associada a fotofobia, fonofobia e náusea, sem aura visual ou sensitiva. Identifica estresse como gatilho. Tentou uso prévio de amitriptilina, sem resposta clínica satisfatória. Nega irradiação cervical."

REGRAS DE OURO

1) NÃO INVENTE — nunca acrescente sintoma, sinal, exame, diagnóstico, medicação, dose, posologia ou achado que NÃO esteja no texto original.
2) NÃO REDUZA o conteúdo. Você deve EXPANDIR e ESTRUTURAR, não simplificar. Se o original tem 5 informações, a saída deve ter as MESMAS 5 informações — porém em linguagem médica completa.
3) EXPANDA abreviações para a forma técnica correta:
   - "pcte"→"paciente", "fem"→"do sexo feminino", "masc"→"do sexo masculino"
   - "rdcat"→"irradiação cervical", "lat D/E"→"à direita/esquerda"
   - "MS/MI"→"membro superior/inferior", "MMSS/MMII"→"membros superiores/inferiores"
   - "ROT"→"reflexos osteotendíneos", "RCP"→"reflexo cutâneo-plantar"
   - "↓/↑"→"diminuído/aumentado"
   - "FX"→"força" (em escala 0–V de Medical Research Council)
   - "sg AC"→"sem alterações"
   Mantenha siglas QUE JÁ SÃO PADRÃO em prontuário: HAS, DM2, HDA, AC, AR, RNM, TC, EEG, AVC, AIT, BNRNF, MV+, RHA+.
4) ORGANIZAÇÃO conforme o tipo de campo (você receberá instrução específica). Use ordem cronológica para HDA, topográfica para exame neurológico, sistêmica para exame físico.
5) PRESERVE INTEGRALMENTE: lateralidade (D/E), números, datas, doses, escalas, cronologia, NEGAÇÕES. "Nega X" é informação clínica relevante e deve aparecer na saída.
6) FORMALIDADE em pt-BR. Sem coloquialismos. Sem "o paciente disse que…"; use "refere", "nega", "apresenta", "queixa-se de".
7) Se o texto original estiver muito curto/vago (menos de uma frase), devolva-o praticamente como está, apenas com correção ortográfica e pontuação — não fabrique conteúdo.
8) NÃO use markdown (sem **, ##, listas com -). Use texto corrido em parágrafos. Listas só quando o tipo de campo pedir explicitamente (ex.: hipóteses diagnósticas enumeradas).
9) Devolva APENAS o texto reescrito. Sem aspas envolventes, sem cabeçalhos, sem "Aqui está...", sem comentários metalinguísticos.`;

async function callAI(cfg, fieldInstruction, text) {
  const userPrompt = `${fieldInstruction}\n\n--- TEXTO ORIGINAL ---\n${text}\n--- FIM ---`;
  if (cfg.provider === 'anthropic') {
    const model = cfg.model || AI_DEFAULTS.anthropic.model;
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': cfg.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model,
        max_tokens: 4000,
        system: AI_SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data?.error?.message || `HTTP ${resp.status}`);
    return (data.content || []).map(b => b.text || '').join('').trim();
  } else {
    const model = cfg.model || AI_DEFAULTS.openai.model;
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${cfg.apiKey}`,
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model,
        max_tokens: 4000,
        messages: [
          { role: 'system', content: AI_SYSTEM_PROMPT },
          { role: 'user',   content: userPrompt }
        ]
      })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data?.error?.message || `HTTP ${resp.status}`);
    return (data.choices?.[0]?.message?.content || '').trim();
  }
}

async function callAILaudo(cfg, patient, history, consults, tipo, tone, instrucoes) {
  const SEX_LABEL = { F: 'Feminino', M: 'Masculino', O: 'Outro' };
  const patientInfo = [
    `Nome: ${patient.full_name}`,
    patient.birth_date ? `Idade: ${age(patient.birth_date)} anos (nascido em ${fmtDate(patient.birth_date)})` : null,
    patient.sex ? `Sexo: ${SEX_LABEL[patient.sex]}` : null,
    patient.cpf ? `CPF: ${patient.cpf}` : null,
    patient.rg  ? `RG: ${patient.rg}` : null,
    patient.occupation     ? `Profissão: ${patient.occupation}` : null,
    patient.marital_status ? `Estado civil: ${patient.marital_status}` : null,
    patient.address ? `Endereço: ${patient.address}` : null,
  ].filter(Boolean).join(' · ');

  const histInfo = history ? [
    history.comorbidities    ? `Comorbidades: ${history.comorbidities}` : null,
    history.allergies        ? `Alergias: ${history.allergies}` : null,
    history.current_meds     ? `Medicações em uso: ${history.current_meds}` : null,
    history.past_history     ? `Antecedentes pessoais: ${history.past_history}` : null,
    history.surgical_history ? `Antecedentes cirúrgicos: ${history.surgical_history}` : null,
    history.family_history   ? `Antecedentes familiares: ${history.family_history}` : null,
    history.habits           ? `Hábitos: ${history.habits}` : null,
    history.gyn_obs          ? `Ginecológico/obstétrico: ${history.gyn_obs}` : null,
    history.notes            ? `Observações do histórico: ${history.notes}` : null,
  ].filter(Boolean).join('\n') : '';

  const consultsInfo = (consults || []).map((c, i) => {
    const lines = [`=== CONSULTA ${i + 1} — ${fmtDateTime(c.consultation_date)} (${c.type || 'consulta'}) ===`];
    if (c.chief_complaint)        lines.push(`Queixa principal: ${c.chief_complaint}`);
    if (c.hda)                    lines.push(`HDA: ${c.hda}`);
    if (c.physical_exam)          lines.push(`Exame físico: ${c.physical_exam}`);
    if (c.neuro_exam)             lines.push(`Exame neurológico: ${c.neuro_exam}`);
    if (c.hypothesis)             lines.push(`Hipótese diagnóstica: ${c.hypothesis}`);
    if ((c.cid_codes || []).length) lines.push(`CID-10: ${c.cid_codes.join(', ')}`);
    if (c.plan)                   lines.push(`Conduta: ${c.plan}`);
    if (c.return_in)              lines.push(`Retorno: ${c.return_in}`);
    if (c.notes)                  lines.push(`Observações: ${c.notes}`);
    return lines.join('\n');
  }).join('\n\n');

  const TONE_DESC = {
    objetivo:  'Texto enxuto, em 1–2 páginas, frases diretas, sem redundância.',
    detalhado: 'Texto detalhado, em 2–3 páginas, com descrição completa de evolução, exame e raciocínio diagnóstico.',
    extenso:   'Texto extenso, em 3 ou mais páginas, com descrição minuciosa de cada item, contextualização clínica ampla e justificativa diagnóstica robusta.'
  };

  const userPrompt = `Gere um ${LAUDO_TIPOS[tipo]} a partir dos dados clínicos abaixo.

DADOS DO PACIENTE
-----------------
${patientInfo}

HISTÓRICO MÉDICO
----------------
${histInfo || '(sem histórico registrado)'}

CONSULTAS REGISTRADAS
---------------------
${consultsInfo || '(sem consultas registradas)'}

${instrucoes ? `INSTRUÇÕES ESPECÍFICAS DO MÉDICO
--------------------------------
${instrucoes}` : ''}

ESTRUTURA OBRIGATÓRIA DO LAUDO (siga em ordem, em parágrafos contínuos):

1. IDENTIFICAÇÃO DO PACIENTE — nome, idade/data de nascimento, sexo, CPF, profissão (quando disponível), estado civil, endereço.
2. HISTÓRIA CLÍNICA / HDA — síntese cronológica baseada nas queixas e HDAs das consultas. Mencione início, evolução, características e fatores associados.
3. ANTECEDENTES — pessoais, familiares, hábitos (use os do histórico médico).

TOM E EXTENSÃO: ${TONE_DESC[tone] || TONE_DESC.detalhado}

REGRAS RÍGIDAS:
- NÃO INVENTE achados, sintomas, diagnósticos ou exames que não estejam nos dados fornecidos.
- USE LINGUAGEM TÉCNICA FORMAL pt-BR de prontuário hospitalar.

  if (cfg.provider === 'anthropic') {

      method: 'POST',
      headers: {
        'x-api-key': cfg.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model,
        max_tokens: 4000,
        system: AI_SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data?.error?.message || `HTTP ${resp.status}`);
    return (data.content || []).map(b => b.text || '').join('').trim();
  } else {
    const model = cfg.model || AI_DEFAULTS.openai.model;
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${cfg.apiKey}`, 'content-type': 'application/json' },
      body: JSON.stringify({
        model,
        max_tokens: 4000,
        messages: [
          { role: 'system', content: AI_SYSTEM_PROMPT },
          { role: 'user',   content: userPrompt }
        ]
      })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data?.error?.message || `HTTP ${resp.status}`);
    return (data.choices?.[0]?.message?.content || '').trim();
  }
}


/* ===========================================================
   MODAL — suporta empilhamento (open dentro de open).
   Cada modal vira uma camada própria; closeModal() fecha apenas
   o topo da pilha. Assim, o modal de IA não destrói o modal da
   consulta que está embaixo.
=========================================================== */
const modalStack = [];

function openModal({ title, bodyHTML, footHTML = '', size = 'md', onMount }) {
  const sizeCls = size === 'lg' ? ' lg' : '';
  const id = 'modal-' + Math.random().toString(36).slice(2, 9);
  const wrapper = document.createElement('div');
  wrapper.className = 'modal-bg';
  wrapper.dataset.modalId = id;
  wrapper.style.zIndex = String(100 + modalStack.length * 10);
  wrapper.innerHTML = `
    <div class="modal${sizeCls}" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3>${title}</h3>
        <button class="modal-close" data-close aria-label="Fechar">×</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
      <div class="modal-foot">${footHTML}</div>
    </div>
  `;
  document.body.appendChild(wrapper);
  document.body.style.overflow = 'hidden';

  // handlers escopados a este modal
  wrapper.querySelectorAll('[data-close]').forEach(b => {
    b.onclick = () => closeModal(id);
  });
  wrapper.addEventListener('click', (e) => {
    if (e.target === wrapper) closeModal(id);
  });
  const escHandler = (e) => {
    // Esc fecha apenas o modal do topo
    if (e.key === 'Escape' && modalStack.length && modalStack[modalStack.length - 1].id === id) {
      closeModal(id);
    }
  };
  document.addEventListener('keydown', escHandler);

  modalStack.push({ id, wrapper, escHandler });

  const modal = wrapper.querySelector('.modal');
  if (onMount) onMount(modal);
}

function closeModal(id) {
  if (!modalStack.length) return;
  const idx = id
    ? modalStack.findIndex(m => m.id === id)
    : modalStack.length - 1; // fecha o topo se id não for passado
  if (idx < 0) return;

  const m = modalStack[idx];
  try { m.wrapper.remove(); } catch (_) {}
  document.removeEventListener('keydown', m.escHandler);
  modalStack.splice(idx, 1);

  if (!modalStack.length) {
    document.body.style.overflow = '';
  }
}

/* compat: alguns lugares antigos podem ler #modal-host. mantém vazio. */
